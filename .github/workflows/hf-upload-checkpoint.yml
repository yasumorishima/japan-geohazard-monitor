name: Upload checkpoint to Hugging Face

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run ID holding the checkpoint artifact
        required: true
        default: "28721077491"
      artifact:
        description: Artifact name
        required: true
        default: "backfill-checkpoint-28721077491"

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download checkpoint artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ inputs.run_id }}" -n "${{ inputs.artifact }}" -D dl --repo "${{ github.repository }}"
          ls -laR dl

      - name: Locate DB and integrity check
        id: db
        run: |
          DB="$(find dl -name '*.db' | head -1)"
          if [ -z "$DB" ]; then echo "no .db found"; find dl -type f; exit 1; fi
          echo "path=$DB" >> "$GITHUB_OUTPUT"
          ls -la "$DB"
          echo "integrity: $(sqlite3 "$DB" 'PRAGMA integrity_check;' | head -1)"
          echo "table_count: $(sqlite3 "$DB" "SELECT count(*) FROM sqlite_master WHERE type='table';")"

      - name: Install huggingface_hub
        run: pip install --quiet "huggingface_hub>=0.26"

      - name: Upload to Hugging Face (guarded via hf_sync.py)
        # Use the guarded uploader (integrity + absolute floor + row-count
        # no-regression manifest) instead of a raw `hf upload`, so a manual
        # reseed cannot silently overwrite the canonical with a degraded DB and
        # the row-count manifest stays in sync with the daily pipeline.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 scripts/hf_sync.py \
            --src "${{ steps.db.outputs.path }}" \
            --repo yasumorishima/japan-geohazard \
            --path geohazard.db \
            --squash
