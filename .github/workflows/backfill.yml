            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Upload so2.db artifact
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backfill-so2-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 7

  # =====================================================================
  # FETCH-CLOUD — MODIS cloud fraction only. Requires Earthdata auth.
  # =====================================================================
  fetch-cloud:
    if: >-
      github.event_name == 'schedule'
      || inputs.target == 'all'
      || inputs.target == ''
      || inputs.target == 'cloud'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      fetch_cloud: ${{ steps.fetch_cloud.outcome }}
      snapshot_outcome: ${{ steps.snapshot.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite numpy scipy netCDF4 google-cloud-bigquery pyarrow scikit-learn h5py
          sudo apt-get install -y ncompress

      - name: Restore previous database checkpoint
