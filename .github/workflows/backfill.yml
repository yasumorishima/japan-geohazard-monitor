              NEEDS_INIT=1
            fi
          fi
          if [ "$NEEDS_INIT" = "1" ]; then
            python3 -c "
          import asyncio, sys
          sys.path.insert(0, 'src')
          from db import init_db
          asyncio.run(init_db())
          print('DB initialised')
          "
            if [ $? -ne 0 ]; then
              echo "::error::init_db failed"
              exit 1
            fi
          fi

      - name: Validate Earthdata credentials
        id: earthdata_check
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          if python3 scripts/test_earthdata_auth.py; then
            echo "earthdata_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "earthdata_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Earthdata auth FAILED -- cloud will be skipped"
          fi
        continue-on-error: true

      - name: Fetch MODIS cloud fraction
        id: fetch_cloud
        if: (inputs.target == 'all' || inputs.target == 'cloud' || inputs.target == '') && steps.earthdata_check.outputs.earthdata_ok == 'true'
        continue-on-error: true
        # 900 dates * ~6.75s/date = ~101min observed (runs 24632791571 +
        # 24636570051 hit 90min timeout at 800/900). 120min gives ~19min
        # buffer. SIGKILL on timeout leaves DB in a state that passes local
        # integrity_check but merge rejects as malformed (verified runs
        # 24619904953 + diag 24623870561 + verify 24626051376 + 24636570051).
        # cda044f + 9abdde3 snapshot guards cannot detect this corruption,
        # so preventing SIGKILL is the only reliable fix.
        timeout-minutes: 120
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
          CLOUD_MAX_DATES: "900"
        run: python3 -u scripts/fetch_cloud_fraction.py

      - name: Snapshot DB
        id: snapshot
        if: always()
        run: |
          python3 -c "
          import sqlite3, sys, os, subprocess
          try:
              src = sqlite3.connect('data/geohazard.db')
              src.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              r = src.execute('PRAGMA integrity_check').fetchone()[0]
              if r != 'ok':
                  print(f'REFUSING to snapshot corrupt DB: {r[:200]}')
                  src.close()
                  sys.exit(1)
              dst = sqlite3.connect('data/geohazard_snapshot.db')
              src.backup(dst)
              dst.close()
              src.close()
              # Post-backup verification via sqlite3 CLI subprocess after os.sync().
              # 2026-04-19 diag run 24623870561 proved the in-process Python
              # sqlite3 integrity_check on dst can return 'ok' while the
              # on-disk artifact is actually malformed (merge later rejects it
              # with 'database disk image is malformed'). Cause likely OS page
              # cache / writer-side view. Force flush + fresh subprocess +
              # SELECT COUNT on the populated table catches the real state.
              os.sync()
              r2 = subprocess.run(
                  ['sqlite3', 'data/geohazard_snapshot.db',
                   'PRAGMA integrity_check;\nSELECT COUNT(*) FROM cloud_fraction;'],
                  capture_output=True, text=True, timeout=600
              )
              first = (r2.stdout.strip().split('\n')[0] if r2.stdout.strip() else '').strip()
              if r2.returncode != 0 or first != 'ok':
                  print(f'REFUSING to upload corrupt snapshot (post-backup CLI verify):')
                  print(f'  returncode={r2.returncode}')
                  print(f'  stdout={r2.stdout[:400]}')
                  print(f'  stderr={r2.stderr[:400]}')
                  sys.exit(1)
              print(f'Snapshot verified (subprocess CLI): {r2.stdout.strip()[:200]}')
          except Exception as e:
              print(f'Snapshot failed: {e}')
              sys.exit(1)
          "
          if [ -f data/geohazard_snapshot.db ]; then
            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Upload cloud.db artifact
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backfill-cloud-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 7

  # =====================================================================
  # FETCH-SNET — win32tools install + S-net waveform + S-net pressure.
  # These three steps share HinetPy tooling and credentials; keeping them
  # in one job avoids re-installing win32tools twice. Typical combined
  # runtime ~3h; timeout 240m.
  # =====================================================================
  fetch-snet:
    if: >-
      github.event_name == 'schedule'
      || inputs.target == 'all'
      || inputs.target == ''
      || inputs.target == 'snet_waveform'
      || inputs.target == 'snet_pressure'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      install_win32tools: ${{ steps.install_win32tools.outcome }}
      fetch_snet_waveform: ${{ steps.fetch_snet_waveform.outcome }}
      fetch_snet_pressure: ${{ steps.fetch_snet_pressure.outcome }}
      snapshot_outcome: ${{ steps.snapshot.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite numpy scipy netCDF4 google-cloud-bigquery pyarrow scikit-learn h5py
          sudo apt-get install -y ncompress

      - name: Restore previous database checkpoint
        id: restore
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash {0}
        run: |
          set +e
          mkdir -p data results
          RESTORED=""
          MAX_TRIES=30
          for PREFIX in "backfill-checkpoint-" "database-checkpoint-"; do
            [ -n "$RESTORED" ] && break
            RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name | startswith(\"${PREFIX}\")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0:${MAX_TRIES}] | .[].workflow_run.id" 2>/dev/null)
            for PREV_RUN in $RUN_IDS; do
              [ -z "$PREV_RUN" ] && continue
              case "$PREV_RUN" in (*[!0-9]*) continue;; esac
              [ "$PREV_RUN" = "${{ github.run_id }}" ] && continue
              ARTIFACT_NAME="${PREFIX}${PREV_RUN}"
              echo "Trying artifact: $ARTIFACT_NAME"
              rm -rf /tmp/db-restore
              gh run download "$PREV_RUN" --repo ${{ github.repository }} \
                --name "$ARTIFACT_NAME" --dir /tmp/db-restore 2>/dev/null
              if [ $? -ne 0 ]; then
                echo "  download failed -- skip"
                continue
              fi
              DB_FILE="/tmp/db-restore/geohazard.db"
              [ ! -f "$DB_FILE" ] && DB_FILE="/tmp/db-restore/data/geohazard.db"
              if [ ! -f "$DB_FILE" ]; then
                echo "  no geohazard.db in artifact -- skip"
                continue
              fi
              cp "$DB_FILE" data/geohazard.db
              rm -f data/geohazard.db-wal data/geohazard.db-shm
              DB_SIZE=$(du -h data/geohazard.db | cut -f1)
              echo "  copied ($DB_SIZE) -- checking integrity"
              python3 scripts/check_db_integrity.py data/geohazard.db
              if [ $? -eq 0 ]; then
                RESTORED="${ARTIFACT_NAME}"
                echo "restored=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
                echo "Restored from $ARTIFACT_NAME"
                break
              else
                echo "  corrupted -- attempting per-table salvage"
                python3 scripts/salvage_db.py --src data/geohazard.db --dst /tmp/salvaged.db
                if [ $? -eq 0 ] && [ -f /tmp/salvaged.db ]; then
                  rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
                  mv /tmp/salvaged.db data/geohazard.db
                  RESTORED="${ARTIFACT_NAME}-salvaged"
                  echo "restored=${ARTIFACT_NAME}-salvaged" >> "$GITHUB_OUTPUT"
                  echo "Salvaged via per-table copy from $ARTIFACT_NAME"
                  break
                fi
                echo "  salvage failed -- trying next artifact"
                rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm /tmp/salvaged.db
              fi
            done
          done
          if [ -z "$RESTORED" ]; then
            echo "No usable checkpoint found -- will init fresh DB"
          fi
          exit 0

      - name: Init DB if missing or corrupt
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        shell: bash {0}
        run: |
          set +e
          NEEDS_INIT=0
          if [ ! -f data/geohazard.db ]; then
            NEEDS_INIT=1
            echo "No DB file -- will init"
          else
            python3 scripts/check_db_integrity.py data/geohazard.db > /dev/null
            if [ $? -ne 0 ]; then
              echo "Existing DB is corrupt -- removing and re-initialising"
              rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
              NEEDS_INIT=1
            fi
          fi
          if [ "$NEEDS_INIT" = "1" ]; then
            python3 -c "
          import asyncio, sys
          sys.path.insert(0, 'src')
          from db import init_db
          asyncio.run(init_db())
          print('DB initialised')
          "
            if [ $? -ne 0 ]; then
              echo "::error::init_db failed"
              exit 1
            fi
          fi

      - name: Install win32tools for S-net (catwin32 + win2sac_32)
        id: install_win32tools
        if: inputs.target == 'all' || inputs.target == 'snet_waveform' || inputs.target == 'snet_pressure' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 5
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          if [ -z "$HINET_USER" ] || [ -z "$HINET_PASS" ]; then
            echo "HINET credentials not set, skipping win32tools"
            exit 0
          fi
          pip install HinetPy 2>/dev/null || true
          python3 -c "from HinetPy import Client; Client('${HINET_USER}', '${HINET_PASS}')._get_win32tools()" || exit 0
          if [ -f win32tools.tar.gz ]; then
            tar -xf win32tools.tar.gz && rm win32tools.tar.gz
            cd win32tools && make && mkdir -p bin && mv catwin32.src/catwin32 win2sac.src/win2sac_32 bin/ && cd ..
            echo "${{ github.workspace }}/win32tools/bin" >> $GITHUB_PATH
          fi

      - name: Fetch S-net multi-sensor waveform features
        id: fetch_snet_waveform
        if: inputs.target == 'all' || inputs.target == 'snet_waveform' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 150
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install HinetPy 2>/dev/null || true
          python3 scripts/fetch_snet_waveform.py || echo "S-net waveform fetch failed (non-fatal)"
          if [ -f results/snet_coverage.json ]; then
            mkdir -p results/midrun
            cp results/snet_coverage.json results/midrun/
          fi

      - name: Fetch S-net seafloor pressure data (HinetPy)
        id: fetch_snet_pressure
        if: inputs.target == 'all' || inputs.target == 'snet_pressure' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          pip install HinetPy 2>/dev/null || true
          python3 scripts/fetch_snet_pressure.py || echo "S-net pressure fetch failed (non-fatal)"

      - name: Snapshot DB
        id: snapshot
        if: always()
        run: |
          python3 -c "
          import sqlite3, sys
          try:
              src = sqlite3.connect('data/geohazard.db')
              src.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              r = src.execute('PRAGMA integrity_check').fetchone()[0]
              if r != 'ok':
                  print(f'REFUSING to snapshot corrupt DB: {r[:200]}')
                  src.close()
                  sys.exit(1)
              dst = sqlite3.connect('data/geohazard_snapshot.db')
              src.backup(dst)
              dst.close()
              src.close()
              verify = sqlite3.connect('data/geohazard_snapshot.db')
              r2 = verify.execute('PRAGMA integrity_check').fetchone()[0]
              verify.close()
              if r2 != 'ok':
                  print(f'REFUSING to upload corrupt snapshot (post-backup): {r2[:200]}')
                  sys.exit(1)
              print('Snapshot created (post-integrity-check + post-backup verify)')
          except Exception as e:
              print(f'Snapshot failed: {e}')
              sys.exit(1)
          "
          if [ -f data/geohazard_snapshot.db ]; then
            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Upload snet.db artifact
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backfill-snet-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 7

  # =====================================================================
  # LIGHT JOB -- all 26 other fetchers. Combined estimated runtime ~1h45m;
  # timeout 200m leaves slack. Serves as the base DB for merge.
  # =====================================================================
  light:
    if: inputs.target != 'diagnostic'
    runs-on: ubuntu-latest
    timeout-minutes: 200
    outputs:
      fetch_earthquakes: ${{ steps.fetch_earthquakes.outcome }}
      fetch_tec_event: ${{ steps.fetch_tec_event.outcome }}
      fetch_tec_random: ${{ steps.fetch_tec_random.outcome }}
      fetch_kp: ${{ steps.fetch_kp.outcome }}
      fetch_cmt: ${{ steps.fetch_cmt.outcome }}
      fetch_gnss_tec: ${{ steps.fetch_gnss_tec.outcome }}
      fetch_ulf: ${{ steps.fetch_ulf.outcome }}
      fetch_cosmic_ray: ${{ steps.fetch_cosmic_ray.outcome }}
      fetch_lightning: ${{ steps.fetch_lightning.outcome }}
      fetch_iss_lis: ${{ steps.fetch_iss_lis.outcome }}
      fetch_wwlln_thunder_hour: ${{ steps.fetch_wwlln_thunder_hour.outcome }}
      fetch_lis_otd_monthly: ${{ steps.fetch_lis_otd_monthly.outcome }}
      fetch_geomag: ${{ steps.fetch_geomag.outcome }}
      fetch_olr: ${{ steps.fetch_olr.outcome }}
      fetch_iers: ${{ steps.fetch_iers.outcome }}
      fetch_solar_wind: ${{ steps.fetch_solar_wind.outcome }}
      fetch_grace: ${{ steps.fetch_grace.outcome }}
      fetch_tide_gauge: ${{ steps.fetch_tide_gauge.outcome }}
      fetch_soil_moisture: ${{ steps.fetch_soil_moisture.outcome }}
      fetch_ocean_color: ${{ steps.fetch_ocean_color.outcome }}
      fetch_nightlight: ${{ steps.fetch_nightlight.outcome }}
      fetch_goes_xray: ${{ steps.fetch_goes_xray.outcome }}
      fetch_goes_proton: ${{ steps.fetch_goes_proton.outcome }}
      fetch_tidal_stress: ${{ steps.fetch_tidal_stress.outcome }}
      fetch_particle_flux: ${{ steps.fetch_particle_flux.outcome }}
      fetch_dart: ${{ steps.fetch_dart.outcome }}
      fetch_ioc_sealevel: ${{ steps.fetch_ioc_sealevel.outcome }}
      snapshot_outcome: ${{ steps.snapshot.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite numpy scipy netCDF4 google-cloud-bigquery pyarrow scikit-learn h5py
          sudo apt-get install -y ncompress

      - name: Restore previous database checkpoint
        id: restore
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash {0}
        run: |
          set +e
          mkdir -p data results
          RESTORED=""
          MAX_TRIES=30
          for PREFIX in "backfill-checkpoint-" "database-checkpoint-"; do
            [ -n "$RESTORED" ] && break
            RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name | startswith(\"${PREFIX}\")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0:${MAX_TRIES}] | .[].workflow_run.id" 2>/dev/null)
            for PREV_RUN in $RUN_IDS; do
              [ -z "$PREV_RUN" ] && continue
              case "$PREV_RUN" in (*[!0-9]*) continue;; esac
              [ "$PREV_RUN" = "${{ github.run_id }}" ] && continue
              ARTIFACT_NAME="${PREFIX}${PREV_RUN}"
              echo "Trying artifact: $ARTIFACT_NAME"
              rm -rf /tmp/db-restore
              gh run download "$PREV_RUN" --repo ${{ github.repository }} \
                --name "$ARTIFACT_NAME" --dir /tmp/db-restore 2>/dev/null
              if [ $? -ne 0 ]; then
                echo "  download failed -- skip"
                continue
              fi
              DB_FILE="/tmp/db-restore/geohazard.db"
              [ ! -f "$DB_FILE" ] && DB_FILE="/tmp/db-restore/data/geohazard.db"
              if [ ! -f "$DB_FILE" ]; then
                echo "  no geohazard.db in artifact -- skip"
                continue
              fi
              cp "$DB_FILE" data/geohazard.db
              rm -f data/geohazard.db-wal data/geohazard.db-shm
              DB_SIZE=$(du -h data/geohazard.db | cut -f1)
              echo "  copied ($DB_SIZE) -- checking integrity"
              python3 scripts/check_db_integrity.py data/geohazard.db
              if [ $? -eq 0 ]; then
                RESTORED="${ARTIFACT_NAME}"
                echo "restored=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
                echo "Restored from $ARTIFACT_NAME"
                break
              else
                echo "  corrupted -- attempting per-table salvage"
                python3 scripts/salvage_db.py --src data/geohazard.db --dst /tmp/salvaged.db
                if [ $? -eq 0 ] && [ -f /tmp/salvaged.db ]; then
                  rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
                  mv /tmp/salvaged.db data/geohazard.db
                  RESTORED="${ARTIFACT_NAME}-salvaged"
                  echo "restored=${ARTIFACT_NAME}-salvaged" >> "$GITHUB_OUTPUT"
                  echo "Salvaged via per-table copy from $ARTIFACT_NAME"
                  break
                fi
                echo "  salvage failed -- trying next artifact"
                rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm /tmp/salvaged.db
              fi
            done
          done
          if [ -z "$RESTORED" ]; then
            echo "No usable checkpoint found -- will init fresh DB"
          fi
          exit 0

      - name: Init DB if missing or corrupt
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        shell: bash {0}
        run: |
          set +e
          NEEDS_INIT=0
          if [ ! -f data/geohazard.db ]; then
            NEEDS_INIT=1
            echo "No DB file -- will init"
          else
            python3 scripts/check_db_integrity.py data/geohazard.db > /dev/null
            if [ $? -ne 0 ]; then
              echo "Existing DB is corrupt -- removing and re-initialising"
              rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
              NEEDS_INIT=1
            fi
          fi
          if [ "$NEEDS_INIT" = "1" ]; then
            python3 -c "
          import asyncio, sys
          sys.path.insert(0, 'src')
          from db import init_db
          asyncio.run(init_db())
          print('DB initialised')
          "
            if [ $? -ne 0 ]; then
              echo "::error::init_db failed"
              exit 1
            fi
          fi

      - name: Validate Earthdata credentials
        id: earthdata_check
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          if python3 scripts/test_earthdata_auth.py; then
            echo "earthdata_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "earthdata_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Earthdata auth FAILED -- nightlight, ISS LIS will be skipped"
          fi
        continue-on-error: true

      - name: Fetch earthquake data (M3+, 2011-2026)
        id: fetch_earthquakes
        if: inputs.target == 'all' || inputs.target == 'earthquakes' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data
          python3 scripts/fetch_earthquakes.py

      - name: Fetch TEC data (continuous 2011-now, recent-first)
        id: fetch_tec_event
        if: inputs.target == 'all' || inputs.target == 'tec' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          TEC_MAX_DATES: "150"
        run: |
          python3 scripts/fetch_tec.py --mode continuous

      - name: Fetch TEC random baseline (legacy, skipped in continuous mode)
        id: fetch_tec_random
        if: false
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode random --n-dates 300

      - name: Fetch Kp data (2011-2026)
        id: fetch_kp
        if: inputs.target == 'all' || inputs.target == 'kp' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kp.py

      - name: Fetch CMT focal mechanisms (GCMT, 2011-present)
        id: fetch_cmt
        if: inputs.target == 'all' || inputs.target == 'cmt' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cmt.py

      - name: Fetch GNSS-TEC high-resolution data (Nagoya University ISEE)
        id: fetch_gnss_tec
        if: inputs.target == 'all' || inputs.target == 'gnss_tec' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          GNSS_TEC_MAX_DATES: "30"
        run: |
          python3 scripts/fetch_gnss_tec.py || echo "GNSS-TEC fetch non-fatal failure"

      - name: Fetch Kakioka ULF magnetic data
        id: fetch_ulf
        if: inputs.target == 'all' || inputs.target == 'ulf' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          ULF_MAX_DATES: "300"
        run: |
          python3 scripts/fetch_kakioka_ulf.py || echo "ULF fetch completed"

      - name: Fetch NMDB cosmic ray data
        id: fetch_cosmic_ray
        if: inputs.target == 'all' || inputs.target == 'cosmic_ray' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_nmdb_cosmicray.py || echo "NMDB fetch failed (non-fatal)"

      - name: Fetch Blitzortung lightning data
        id: fetch_lightning
        if: inputs.target == 'all' || inputs.target == 'lightning' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          LIGHTNING_MAX_DATES: "200"
        run: |
          python3 scripts/fetch_blitzortung.py || echo "Lightning fetch failed (non-fatal)"

      - name: Fetch ISS LIS lightning data (Earthdata auth, 2017-2023)
        id: fetch_iss_lis
        if: (inputs.target == 'all' || inputs.target == 'iss_lis' || inputs.target == '') && steps.earthdata_check.outputs.earthdata_ok == 'true'
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_iss_lis_lightning.py || echo "ISS LIS fetch failed (non-fatal)"

      - name: Fetch WWLLN Monthly Thunder Hour (Earthdata auth, 2013-2025)
        id: fetch_wwlln_thunder_hour
        if: (inputs.target == 'all' || inputs.target == 'wwlln_thunder_hour' || inputs.target == '') && steps.earthdata_check.outputs.earthdata_ok == 'true'
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_wwlln_thunder_hour.py || echo "WWLLN thunder-hour fetch failed (non-fatal)"

      - name: Fetch LIS/OTD Monthly Climatology Time Series (Earthdata auth, 1995-2014)
        id: fetch_lis_otd_monthly
        if: (inputs.target == 'all' || inputs.target == 'lis_otd_monthly' || inputs.target == '') && steps.earthdata_check.outputs.earthdata_ok == 'true'
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_lis_otd_monthly.py || echo "LIS/OTD monthly fetch failed (non-fatal)"

      - name: Fetch INTERMAGNET hourly + CSES satellite EM data
        id: fetch_geomag
        if: inputs.target == 'all' || inputs.target == 'geomag' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          GEOMAG_MAX_DAYS: "2000"
        run: |
          python3 -u scripts/fetch_cses_satellite.py

      - name: Fetch NOAA OLR daily (thermal anomaly)
        id: fetch_olr
        if: inputs.target == 'all' || inputs.target == 'olr' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_olr.py || echo "OLR fetch failed (non-fatal)"

      - name: Fetch IERS Earth Orientation Parameters
        id: fetch_iers
        if: inputs.target == 'all' || inputs.target == 'iers' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_iers_eop.py || echo "IERS EOP fetch failed (non-fatal)"

      - name: Fetch NASA OMNIWeb solar wind hourly
        id: fetch_solar_wind
        if: inputs.target == 'all' || inputs.target == 'solar_wind' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_solar_wind.py || echo "Solar wind fetch failed (non-fatal)"

      - name: Fetch GRACE/GRACE-FO gravity anomaly
        id: fetch_grace
        if: (inputs.target == 'all' || inputs.target == 'grace' || inputs.target == '')
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_grace_gravity.py || echo "GRACE fetch failed (non-fatal)"

      - name: Fetch UHSLC tide gauge data
        id: fetch_tide_gauge
        if: inputs.target == 'all' || inputs.target == 'tide_gauge' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tide_gauge.py || echo "Tide gauge fetch failed (non-fatal)"

      - name: Fetch soil moisture (NOAA CPC monthly + SMOPS daily)
        id: fetch_soil_moisture
        if: inputs.target == 'all' || inputs.target == 'soil_moisture' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_smap_moisture.py || echo "Soil moisture fetch failed (non-fatal)"

      - name: Fetch NASA ocean color chlorophyll-a
        id: fetch_ocean_color
        if: (inputs.target == 'all' || inputs.target == 'ocean_color' || inputs.target == '')
        continue-on-error: true
        timeout-minutes: 40
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_ocean_color.py || echo "Ocean color fetch failed (non-fatal)"

      - name: Fetch VIIRS nighttime light/airglow (Earthdata auth)
        id: fetch_nightlight
        if: (inputs.target == 'all' || inputs.target == 'nightlight' || inputs.target == '') && steps.earthdata_check.outputs.earthdata_ok == 'true'
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_viirs_nighttime.py || echo "VIIRS fetch failed (non-fatal)"

      - name: Fetch GOES X-ray flux (solar flares)
        id: fetch_goes_xray
        if: inputs.target == 'all' || inputs.target == 'goes_xray' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_xray.py || echo "GOES X-ray fetch failed (non-fatal)"

      - name: Fetch GOES proton flux (SEP events)
        id: fetch_goes_proton
        if: inputs.target == 'all' || inputs.target == 'goes_proton' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_proton.py || echo "GOES proton fetch failed (non-fatal)"

      - name: Compute tidal stress (lunar+solar, pure calculation)
        id: fetch_tidal_stress
        if: inputs.target == 'all' || inputs.target == 'tidal_stress' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tidal_stress.py || echo "Tidal stress computation failed (non-fatal)"

      - name: Fetch GOES electron flux (particle precipitation)
        id: fetch_particle_flux
        if: inputs.target == 'all' || inputs.target == 'particle_flux' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_poes_particles.py || echo "Particle flux fetch failed (non-fatal)"

      - name: Fetch NOAA DART ocean bottom pressure
        id: fetch_dart
        if: inputs.target == 'all' || inputs.target == 'dart' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_dart_pressure.py || echo "DART pressure fetch failed (non-fatal)"

      - name: Fetch IOC sea level monitoring
        id: fetch_ioc_sealevel
        if: inputs.target == 'all' || inputs.target == 'ioc_sealevel' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_ioc_sealevel.py || echo "IOC sea level fetch failed (non-fatal)"

      - name: Snapshot DB for light artifact
        id: snapshot
        if: always()
        run: |
          python3 -c "
          import sqlite3, sys
          try:
              src = sqlite3.connect('data/geohazard.db')
              src.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              r = src.execute('PRAGMA integrity_check').fetchone()[0]
              if r != 'ok':
                  print(f'REFUSING to snapshot corrupt DB: {r[:200]}')
                  src.close()
                  sys.exit(1)
              dst = sqlite3.connect('data/geohazard_snapshot.db')
              src.backup(dst)
              dst.close()
              src.close()
              verify = sqlite3.connect('data/geohazard_snapshot.db')
              r2 = verify.execute('PRAGMA integrity_check').fetchone()[0]
              verify.close()
              if r2 != 'ok':
                  print(f'REFUSING to upload corrupt snapshot (post-backup): {r2[:200]}')
                  sys.exit(1)
              print('Snapshot created (post-integrity-check + post-backup verify)')
          except Exception as e:
              print(f'Snapshot failed: {e}')
              sys.exit(1)
          "
          if [ -f data/geohazard_snapshot.db ]; then
            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Upload light.db artifact
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backfill-light-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 7

  # =====================================================================
  # MERGE JOB -- combine light (base) with modis / so2 / cloud / snet
  # overlays, then snapshot / coverage / checkpoint / BQ / Discord / Issue.
  # if: always() so single-job failure still triggers BQ upload + reporting.
  # =====================================================================
  merge:
    needs: [fetch-modis, fetch-so2, fetch-cloud, fetch-snet, light]
    if: always() && inputs.target != 'diagnostic'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install google-cloud-bigquery pyarrow numpy

      - name: Download light.db artifact
        id: download_light
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backfill-light-${{ github.run_id }}
          path: /tmp/light

      - name: Download modis.db artifact
        id: download_modis
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backfill-modis-${{ github.run_id }}
          path: /tmp/modis

      - name: Download so2.db artifact
        id: download_so2
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backfill-so2-${{ github.run_id }}
          path: /tmp/so2

      - name: Download cloud.db artifact
        id: download_cloud
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backfill-cloud-${{ github.run_id }}
          path: /tmp/cloud

      - name: Download snet.db artifact
        id: download_snet
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backfill-snet-${{ github.run_id }}
          path: /tmp/snet

      - name: Merge light + 4 overlays
        id: merge
        run: |
          mkdir -p data
          # --require-base ensures we never let an overlay-only DB through to BQ
          # (would WRITE_TRUNCATE every light-owned table and zero them out).
          python3 scripts/merge_checkpoints.py \
            --base /tmp/light/geohazard.db \
            --overlay /tmp/modis/geohazard.db:modis_lst \
            --overlay /tmp/so2/geohazard.db:so2_column \
            --overlay /tmp/cloud/geohazard.db:cloud_fraction \
            --overlay /tmp/snet/geohazard.db:snet_waveform,snet_pressure \
            --dst data/geohazard.db \
            --require-base

      - name: Snapshot merged DB for checkpoint
        id: snapshot
        if: steps.merge.outcome == 'success'
        run: |
          python3 -c "
          import sqlite3, sys
          try:
              src = sqlite3.connect('data/geohazard.db')
              src.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              r = src.execute('PRAGMA integrity_check').fetchone()[0]
              if r != 'ok':
                  print(f'REFUSING to snapshot corrupt DB: {r[:200]}')
                  src.close()
                  sys.exit(1)
              dst = sqlite3.connect('data/geohazard_snapshot.db')
              src.backup(dst)
              dst.close()
              src.close()
              print('Snapshot created (post-integrity-check)')
          except Exception as e:
              print(f'Snapshot failed: {e}')
              sys.exit(1)
          "
          if [ -f data/geohazard_snapshot.db ]; then
            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Coverage report
        if: steps.snapshot.outcome == 'success'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 -c "
          import sqlite3, os
          db = sqlite3.connect(os.environ['GEOHAZARD_DB_PATH'])
          time_col = {
              'earthquakes': 'occurred_at', 'tec': 'epoch', 'geomag_kp': 'time_tag',
              'focal_mechanisms': 'occurred_at', 'gnss_tec': 'epoch',
              'modis_lst': 'observed_date', 'snet_waveform': 'date_str',
          }
          tables = [
              'earthquakes', 'tec', 'geomag_kp', 'focal_mechanisms',
              'gnss_tec', 'modis_lst', 'ulf_magnetic', 'cosmic_ray',
              'lightning', 'iss_lis_lightning', 'lightning_thunder_hour', 'lightning_lis_otd', 'geomag_hourly', 'satellite_em',
              'olr', 'earth_rotation', 'solar_wind', 'gravity_mascon',
              'so2_column', 'cloud_fraction', 'nightlight',
              'goes_xray', 'goes_proton', 'tidal_stress', 'particle_flux',
              'dart_pressure', 'ioc_sea_level', 'tide_gauge', 'ocean_color',
              'soil_moisture', 'snet_pressure', 'snet_waveform',
          ]
          for t in tables:
              try:
                  col = time_col.get(t, 'observed_at')
                  cnt = db.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0]
                  mi = db.execute(f'SELECT MIN({col}) FROM {t}').fetchone()[0]
                  mx = db.execute(f'SELECT MAX({col}) FROM {t}').fetchone()[0]
                  print(f'{t}: {cnt:,} rows ({mi} -> {mx})')
              except Exception as e:
                  print(f'{t}: ERROR {e}')
          db.close()
          "

      - name: Upload checkpoint artifact
        # Only upload when snapshot succeeded (integrity-checked) -- never
        # propagate a corrupt DB as a new checkpoint.
        # CRITICAL: Skip checkpoint upload for targeted dispatch runs.
        # A targeted run (e.g. target=cloud) only fetches one table, so its
        # checkpoint is missing data from other tables that were accumulated
        # in previous full runs. Uploading would overwrite the latest full
        # checkpoint and reset progress for all other tables.
        if: >-
          steps.snapshot.outcome == 'success'
          && (github.event_name != 'workflow_dispatch'
              || inputs.target == 'all'
              || inputs.target == '')
        uses: actions/upload-artifact@v4
        with:
          name: backfill-checkpoint-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 30

      - name: Upload to BigQuery
        id: bq_upload
        # Skip when snapshot's integrity check rejected the DB, or when this
        # is a targeted dispatch -- load_raw_to_bq.py uses WRITE_TRUNCATE for
        # all 31 tables, so a targeted run would overwrite BQ with older
        # rows for non-target tables (exactly what bit lightning_thunder_hour
        # 31,824 -> 24,480 on 2026-04-17).
        if: >-
          steps.snapshot.outcome == 'success'
          && (github.event_name != 'workflow_dispatch'
              || inputs.target == 'all'
              || inputs.target == '')
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: python3 scripts/load_raw_to_bq.py

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FETCH_EARTHQUAKES: ${{ needs.light.outputs.fetch_earthquakes }}
          FETCH_TEC_EVENT: ${{ needs.light.outputs.fetch_tec_event }}
          FETCH_TEC_RANDOM: ${{ needs.light.outputs.fetch_tec_random }}
          FETCH_KP: ${{ needs.light.outputs.fetch_kp }}
          FETCH_CMT: ${{ needs.light.outputs.fetch_cmt }}
          FETCH_SNET_WAVEFORM: ${{ needs.fetch-snet.outputs.fetch_snet_waveform }}
          FETCH_SNET_PRESSURE: ${{ needs.fetch-snet.outputs.fetch_snet_pressure }}
          FETCH_GNSS_TEC: ${{ needs.light.outputs.fetch_gnss_tec }}
          FETCH_MODIS_LST: ${{ needs.fetch-modis.outputs.fetch_modis_lst }}
          FETCH_ULF: ${{ needs.light.outputs.fetch_ulf }}
          FETCH_COSMIC_RAY: ${{ needs.light.outputs.fetch_cosmic_ray }}
          FETCH_LIGHTNING: ${{ needs.light.outputs.fetch_lightning }}
          FETCH_ISS_LIS: ${{ needs.light.outputs.fetch_iss_lis }}
          FETCH_WWLLN_TH: ${{ needs.light.outputs.fetch_wwlln_thunder_hour }}
          FETCH_LIS_OTD: ${{ needs.light.outputs.fetch_lis_otd_monthly }}
          FETCH_GEOMAG: ${{ needs.light.outputs.fetch_geomag }}
          FETCH_OLR: ${{ needs.light.outputs.fetch_olr }}
          FETCH_IERS: ${{ needs.light.outputs.fetch_iers }}
          FETCH_SOLAR_WIND: ${{ needs.light.outputs.fetch_solar_wind }}
          FETCH_GRACE: ${{ needs.light.outputs.fetch_grace }}
          FETCH_SO2: ${{ needs.fetch-so2.outputs.fetch_so2 }}
          FETCH_CLOUD: ${{ needs.fetch-cloud.outputs.fetch_cloud }}
          FETCH_NIGHTLIGHT: ${{ needs.light.outputs.fetch_nightlight }}
          FETCH_TIDE_GAUGE: ${{ needs.light.outputs.fetch_tide_gauge }}
          FETCH_SOIL_MOISTURE: ${{ needs.light.outputs.fetch_soil_moisture }}
          FETCH_OCEAN_COLOR: ${{ needs.light.outputs.fetch_ocean_color }}
          FETCH_GOES_XRAY: ${{ needs.light.outputs.fetch_goes_xray }}
          FETCH_GOES_PROTON: ${{ needs.light.outputs.fetch_goes_proton }}
          FETCH_TIDAL_STRESS: ${{ needs.light.outputs.fetch_tidal_stress }}
          FETCH_PARTICLE_FLUX: ${{ needs.light.outputs.fetch_particle_flux }}
          FETCH_DART: ${{ needs.light.outputs.fetch_dart }}
          FETCH_IOC_SEALEVEL: ${{ needs.light.outputs.fetch_ioc_sealevel }}
          BQ_UPLOAD: ${{ steps.bq_upload.outcome }}
          MERGE_OUTCOME: ${{ steps.merge.outcome }}
          FETCH_MODIS_RESULT: ${{ needs.fetch-modis.result }}
          FETCH_SO2_RESULT: ${{ needs.fetch-so2.result }}
          FETCH_CLOUD_RESULT: ${{ needs.fetch-cloud.result }}
          FETCH_SNET_RESULT: ${{ needs.fetch-snet.result }}
          LIGHT_RESULT: ${{ needs.light.result }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          # When the merge step failed (e.g. base missing under --require-base),
          # data/geohazard.db doesn't exist for the per-table coverage queries.
          if [ ! -f data/geohazard.db ]; then
            python3 -c "
          import json, os, urllib.request
          url = os.environ.get('DISCORD_WEBHOOK_URL', '')
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          body = (
              'fetch-modis: ' + os.environ.get('FETCH_MODIS_RESULT', 'unknown') + '\n'
              'fetch-so2:   ' + os.environ.get('FETCH_SO2_RESULT', 'unknown') + '\n'
              'fetch-cloud: ' + os.environ.get('FETCH_CLOUD_RESULT', 'unknown') + '\n'
              'fetch-snet:  ' + os.environ.get('FETCH_SNET_RESULT', 'unknown') + '\n'
              'light:       ' + os.environ.get('LIGHT_RESULT', 'unknown') + '\n'
              'merge:       ' + os.environ.get('MERGE_OUTCOME', 'unknown') + '\n'
              '\nNo merged DB to report coverage from.'
          )
          payload = json.dumps({'embeds': [{
              'title': '🔴 Backfill #${{ github.run_number }} -- merge skipped/failed',
              'color': 15158332,
              'description': body[:4000],
              'footer': {'text': run_url},
          }]}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          " 2>/dev/null || echo "Discord notification failed (non-fatal)"
            exit 0
          fi
          python3 -c "
          import sqlite3, json, os, urllib.request
          from datetime import date

          db = sqlite3.connect('data/geohazard.db')
          total_days = (date.today() - date(2011, 1, 1)).days

          table_info = {
              'earthquakes': 'SELECT COUNT(DISTINCT substr(occurred_at,1,10)) FROM earthquakes',
              'tec': 'SELECT COUNT(DISTINCT substr(epoch,1,10)) FROM tec',
              'geomag_kp': 'SELECT COUNT(DISTINCT substr(time_tag,1,10)) FROM geomag_kp',
              'focal_mechanisms': 'SELECT COUNT(DISTINCT substr(occurred_at,1,10)) FROM focal_mechanisms',
              'gnss_tec': 'SELECT COUNT(DISTINCT substr(epoch,1,10)) FROM gnss_tec',
              'modis_lst': 'SELECT COUNT(DISTINCT observed_date) FROM modis_lst',
              'ulf_magnetic': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ulf_magnetic',
              'cosmic_ray': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM cosmic_ray',
              'lightning': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM lightning',
              'iss_lis_lightning': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM iss_lis_lightning',
              'lightning_thunder_hour': 'SELECT COUNT(DISTINCT substr(observed_at,1,7)) * 30 FROM lightning_thunder_hour',
              'lightning_lis_otd': 'SELECT COUNT(DISTINCT substr(observed_at,1,7)) * 30 FROM lightning_lis_otd',
              'geomag_hourly': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM geomag_hourly WHERE station=\"KAK\"',
              'satellite_em': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM satellite_em',
              'olr': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM olr',
              'earth_rotation': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM earth_rotation',
              'solar_wind': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM solar_wind',
              'gravity_mascon': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM gravity_mascon',
              'so2_column': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM so2_column',
              'cloud_fraction': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM cloud_fraction',
              'nightlight': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM nightlight',
              'goes_xray': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM goes_xray',
              'goes_proton': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM goes_proton',
              'tidal_stress': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM tidal_stress',
              'particle_flux': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM particle_flux',
              'dart_pressure': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM dart_pressure',
              'ioc_sea_level': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ioc_sea_level',
              'tide_gauge': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM tide_gauge',
              'ocean_color': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ocean_color',
              'soil_moisture': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM soil_moisture',
              'snet_pressure': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM snet_pressure',
              'snet_waveform': 'SELECT COUNT(DISTINCT date_str) FROM snet_waveform',
          }

          lines = []
          alerts = []
          all_95 = True
          for t, date_sql in table_info.items():
              try:
                  cnt = db.execute(f'SELECT COUNT(*) FROM {t}').fetchone()[0]
                  n_dates = db.execute(date_sql).fetchone()[0]
                  pct = round(n_dates / total_days * 100, 1) if total_days > 0 else 0
                  if pct < 95:
                      all_95 = False
                  icon = '✅' if pct >= 95 else '🟡' if pct >= 50 else '🔴'
                  lines.append(f'{icon} {t}: {pct}% ({n_dates}/{total_days}d) {cnt:,} rows')
              except Exception as e:
                  lines.append(f'🔴 {t}: ERROR {e}')
                  alerts.append(f'{t}: {e}')
                  all_95 = False
          db.close()

          step_results = {
              'Earthquakes': os.environ.get('FETCH_EARTHQUAKES', 'skipped'),
              'TEC event': os.environ.get('FETCH_TEC_EVENT', 'skipped'),
              'TEC random': os.environ.get('FETCH_TEC_RANDOM', 'skipped'),
              'Kp': os.environ.get('FETCH_KP', 'skipped'),
              'CMT': os.environ.get('FETCH_CMT', 'skipped'),
              'S-net waveform': os.environ.get('FETCH_SNET_WAVEFORM', 'skipped'),
              'S-net pressure': os.environ.get('FETCH_SNET_PRESSURE', 'skipped'),
              'GNSS-TEC': os.environ.get('FETCH_GNSS_TEC', 'skipped'),
              'MODIS LST': os.environ.get('FETCH_MODIS_LST', 'skipped'),
              'ULF': os.environ.get('FETCH_ULF', 'skipped'),
              'Cosmic ray': os.environ.get('FETCH_COSMIC_RAY', 'skipped'),
              'Lightning': os.environ.get('FETCH_LIGHTNING', 'skipped'),
              'ISS LIS': os.environ.get('FETCH_ISS_LIS', 'skipped'),
              'WWLLN ThunderHour': os.environ.get('FETCH_WWLLN_TH', 'skipped'),
              'LIS/OTD Monthly': os.environ.get('FETCH_LIS_OTD', 'skipped'),
              'Geomag': os.environ.get('FETCH_GEOMAG', 'skipped'),
              'OLR': os.environ.get('FETCH_OLR', 'skipped'),
              'IERS': os.environ.get('FETCH_IERS', 'skipped'),
              'Solar wind': os.environ.get('FETCH_SOLAR_WIND', 'skipped'),
              'GRACE': os.environ.get('FETCH_GRACE', 'skipped'),
              'SO2': os.environ.get('FETCH_SO2', 'skipped'),
              'Cloud': os.environ.get('FETCH_CLOUD', 'skipped'),
              'Nightlight': os.environ.get('FETCH_NIGHTLIGHT', 'skipped'),
              'Tide gauge': os.environ.get('FETCH_TIDE_GAUGE', 'skipped'),
              'Soil moisture': os.environ.get('FETCH_SOIL_MOISTURE', 'skipped'),
              'Ocean color': os.environ.get('FETCH_OCEAN_COLOR', 'skipped'),
              'GOES X-ray': os.environ.get('FETCH_GOES_XRAY', 'skipped'),
              'GOES proton': os.environ.get('FETCH_GOES_PROTON', 'skipped'),
              'Tidal stress': os.environ.get('FETCH_TIDAL_STRESS', 'skipped'),
              'Particle flux': os.environ.get('FETCH_PARTICLE_FLUX', 'skipped'),
              'DART': os.environ.get('FETCH_DART', 'skipped'),
              'IOC sea level': os.environ.get('FETCH_IOC_SEALEVEL', 'skipped'),
              'BQ upload': os.environ.get('BQ_UPLOAD', 'skipped'),
          }
          failed_steps = [k for k, v in step_results.items() if v == 'failure']
          if failed_steps:
              alerts.append('FAILED: ' + ', '.join(failed_steps))

          report = '\n'.join(lines)
          if failed_steps:
              report += '\n\n⚠️ ' + ', '.join(failed_steps) + ' failed'
          if all_95:
              report += '\n\n🎉 ALL ≥95%! Backfill nearly complete'

          if alerts or failed_steps:
              color = 15158332
              title = '🔴 Backfill #${{ github.run_number }} -- issues detected'
          elif all_95:
              color = 3066993
              title = '🎉 Backfill #${{ github.run_number }} -- ≥95% coverage!'
          else:
              color = 3447003
              title = '📊 Backfill #${{ github.run_number }}'

          url = os.environ.get('DISCORD_WEBHOOK_URL', '')
          run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          payload = json.dumps({'embeds': [{
              'title': title,
              'color': color,
              'description': report[:4000],
              'footer': {'text': run_url},
          }]}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          " 2>/dev/null || echo "Discord notification failed (non-fatal)"

      - name: Create issue on failure
        if: >-
          always() && (
            needs.light.outputs.fetch_earthquakes == 'failure' ||
            needs.light.outputs.fetch_tec_event == 'failure' ||
            needs.light.outputs.fetch_tec_random == 'failure' ||
            needs.light.outputs.fetch_kp == 'failure' ||
            needs.light.outputs.fetch_cmt == 'failure' ||
            needs.fetch-snet.outputs.fetch_snet_waveform == 'failure' ||
            needs.fetch-snet.outputs.fetch_snet_pressure == 'failure' ||
            needs.light.outputs.fetch_gnss_tec == 'failure' ||
            needs.fetch-modis.outputs.fetch_modis_lst == 'failure' ||
            needs.light.outputs.fetch_ulf == 'failure' ||
            needs.light.outputs.fetch_cosmic_ray == 'failure' ||
            needs.light.outputs.fetch_lightning == 'failure' ||
            needs.light.outputs.fetch_iss_lis == 'failure' ||
            needs.light.outputs.fetch_wwlln_thunder_hour == 'failure' ||
            needs.light.outputs.fetch_lis_otd_monthly == 'failure' ||
            needs.light.outputs.fetch_geomag == 'failure' ||
            needs.light.outputs.fetch_olr == 'failure' ||
            needs.light.outputs.fetch_iers == 'failure' ||
            needs.light.outputs.fetch_solar_wind == 'failure' ||
            needs.light.outputs.fetch_grace == 'failure' ||
            needs.fetch-so2.outputs.fetch_so2 == 'failure' ||
            needs.fetch-cloud.outputs.fetch_cloud == 'failure' ||
            needs.light.outputs.fetch_nightlight == 'failure' ||
            needs.light.outputs.fetch_tide_gauge == 'failure' ||
            needs.light.outputs.fetch_soil_moisture == 'failure' ||
            needs.light.outputs.fetch_ocean_color == 'failure' ||
            needs.light.outputs.fetch_goes_xray == 'failure' ||
            needs.light.outputs.fetch_goes_proton == 'failure' ||
            needs.light.outputs.fetch_tidal_stress == 'failure' ||
            needs.light.outputs.fetch_particle_flux == 'failure' ||
            needs.light.outputs.fetch_dart == 'failure' ||
            needs.light.outputs.fetch_ioc_sealevel == 'failure' ||
            steps.bq_upload.outcome == 'failure' ||
            steps.merge.outcome == 'failure'
          )
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FAILED=""
          [ "${{ needs.light.outputs.fetch_earthquakes }}" = "failure" ] && FAILED="$FAILED earthquakes"
          [ "${{ needs.light.outputs.fetch_tec_event }}" = "failure" ] && FAILED="$FAILED tec_event"
          [ "${{ needs.light.outputs.fetch_tec_random }}" = "failure" ] && FAILED="$FAILED tec_random"
          [ "${{ needs.light.outputs.fetch_kp }}" = "failure" ] && FAILED="$FAILED kp"
          [ "${{ needs.light.outputs.fetch_cmt }}" = "failure" ] && FAILED="$FAILED cmt"
          [ "${{ needs.fetch-snet.outputs.fetch_snet_waveform }}" = "failure" ] && FAILED="$FAILED snet_waveform"
          [ "${{ needs.fetch-snet.outputs.fetch_snet_pressure }}" = "failure" ] && FAILED="$FAILED snet_pressure"
          [ "${{ needs.light.outputs.fetch_gnss_tec }}" = "failure" ] && FAILED="$FAILED gnss_tec"
          [ "${{ needs.fetch-modis.outputs.fetch_modis_lst }}" = "failure" ] && FAILED="$FAILED modis_lst"
          [ "${{ needs.light.outputs.fetch_ulf }}" = "failure" ] && FAILED="$FAILED ulf"
          [ "${{ needs.light.outputs.fetch_cosmic_ray }}" = "failure" ] && FAILED="$FAILED cosmic_ray"
          [ "${{ needs.light.outputs.fetch_lightning }}" = "failure" ] && FAILED="$FAILED lightning"
          [ "${{ needs.light.outputs.fetch_iss_lis }}" = "failure" ] && FAILED="$FAILED iss_lis"
          [ "${{ needs.light.outputs.fetch_wwlln_thunder_hour }}" = "failure" ] && FAILED="$FAILED wwlln_thunder_hour"
          [ "${{ needs.light.outputs.fetch_lis_otd_monthly }}" = "failure" ] && FAILED="$FAILED lis_otd_monthly"
          [ "${{ needs.light.outputs.fetch_geomag }}" = "failure" ] && FAILED="$FAILED geomag"
          [ "${{ needs.light.outputs.fetch_olr }}" = "failure" ] && FAILED="$FAILED olr"
          [ "${{ needs.light.outputs.fetch_iers }}" = "failure" ] && FAILED="$FAILED iers"
          [ "${{ needs.light.outputs.fetch_solar_wind }}" = "failure" ] && FAILED="$FAILED solar_wind"
          [ "${{ needs.light.outputs.fetch_grace }}" = "failure" ] && FAILED="$FAILED grace"
          [ "${{ needs.fetch-so2.outputs.fetch_so2 }}" = "failure" ] && FAILED="$FAILED so2"
          [ "${{ needs.fetch-cloud.outputs.fetch_cloud }}" = "failure" ] && FAILED="$FAILED cloud"
          [ "${{ needs.light.outputs.fetch_nightlight }}" = "failure" ] && FAILED="$FAILED nightlight"
          [ "${{ needs.light.outputs.fetch_tide_gauge }}" = "failure" ] && FAILED="$FAILED tide_gauge"
          [ "${{ needs.light.outputs.fetch_soil_moisture }}" = "failure" ] && FAILED="$FAILED soil_moisture"
          [ "${{ needs.light.outputs.fetch_ocean_color }}" = "failure" ] && FAILED="$FAILED ocean_color"
          [ "${{ needs.light.outputs.fetch_goes_xray }}" = "failure" ] && FAILED="$FAILED goes_xray"
          [ "${{ needs.light.outputs.fetch_goes_proton }}" = "failure" ] && FAILED="$FAILED goes_proton"
          [ "${{ needs.light.outputs.fetch_tidal_stress }}" = "failure" ] && FAILED="$FAILED tidal_stress"
          [ "${{ needs.light.outputs.fetch_particle_flux }}" = "failure" ] && FAILED="$FAILED particle_flux"
          [ "${{ needs.light.outputs.fetch_dart }}" = "failure" ] && FAILED="$FAILED dart"
          [ "${{ needs.light.outputs.fetch_ioc_sealevel }}" = "failure" ] && FAILED="$FAILED ioc_sealevel"
          [ "${{ steps.bq_upload.outcome }}" = "failure" ] && FAILED="$FAILED bq_upload"
          [ "${{ steps.merge.outcome }}" = "failure" ] && FAILED="$FAILED merge"
          FAILED=$(echo "$FAILED" | xargs)

          if [ -f data/geohazard.db ]; then
            COVERAGE=$(python3 -c "
          import sqlite3
          from datetime import date
          db = sqlite3.connect('data/geohazard.db')
          total = (date.today() - date(2011, 1, 1)).days
          tables = {
              'earthquakes': 'SELECT COUNT(DISTINCT substr(occurred_at,1,10)) FROM earthquakes',
              'tec': 'SELECT COUNT(DISTINCT substr(epoch,1,10)) FROM tec',
              'geomag_kp': 'SELECT COUNT(DISTINCT substr(time_tag,1,10)) FROM geomag_kp',
              'focal_mechanisms': 'SELECT COUNT(DISTINCT substr(occurred_at,1,10)) FROM focal_mechanisms',
              'gnss_tec': 'SELECT COUNT(DISTINCT substr(epoch,1,10)) FROM gnss_tec',
              'modis_lst': 'SELECT COUNT(DISTINCT observed_date) FROM modis_lst',
              'ulf_magnetic': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ulf_magnetic',
              'cosmic_ray': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM cosmic_ray',
              'lightning': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM lightning',
              'iss_lis_lightning': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM iss_lis_lightning',
              'lightning_thunder_hour': 'SELECT COUNT(DISTINCT substr(observed_at,1,7)) * 30 FROM lightning_thunder_hour',
              'lightning_lis_otd': 'SELECT COUNT(DISTINCT substr(observed_at,1,7)) * 30 FROM lightning_lis_otd',
              'geomag_hourly': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM geomag_hourly WHERE station=\"KAK\"',
              'satellite_em': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM satellite_em',
              'olr': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM olr',
              'earth_rotation': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM earth_rotation',
              'solar_wind': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM solar_wind',
              'gravity_mascon': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM gravity_mascon',
              'so2_column': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM so2_column',
              'cloud_fraction': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM cloud_fraction',
              'nightlight': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM nightlight',
              'goes_xray': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM goes_xray',
              'goes_proton': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM goes_proton',
              'tidal_stress': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM tidal_stress',
              'particle_flux': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM particle_flux',
              'dart_pressure': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM dart_pressure',
              'ioc_sea_level': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ioc_sea_level',
              'tide_gauge': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM tide_gauge',
              'ocean_color': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM ocean_color',
              'soil_moisture': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM soil_moisture',
              'snet_pressure': 'SELECT COUNT(DISTINCT substr(observed_at,1,10)) FROM snet_pressure',
              'snet_waveform': 'SELECT COUNT(DISTINCT date_str) FROM snet_waveform',
          }
          for t, sql in tables.items():
              try:
                  n = db.execute(sql).fetchone()[0]
                  pct = round(n / total * 100, 1)
                  print(f'- {t}: {pct}% ({n}/{total}d)')
              except Exception as e:
                  print(f'- {t}: ERROR ({e})')
          db.close()
          " 2>/dev/null || echo "Coverage unavailable")
          else
            COVERAGE="(merged DB unavailable -- merge step likely failed)"
          fi

          gh issue create \
            --repo ${{ github.repository }} \
            --title "Backfill failure: ${FAILED} (run #${{ github.run_number }})" \
            --label "bug,backfill" \
            --body "$(cat <<ISSUE_EOF
          ## Backfill run #${{ github.run_number }} failed

          **Failed steps:** ${FAILED}
          **Run:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Coverage at failure
          ${COVERAGE}

          ### Action needed
          Check the run log for error details and fix the underlying issue.
          ISSUE_EOF
          )"

  # =====================================================================
  # DIAGNOSTIC-CLOUD -- one-shot investigation of cloud.db "database disk
  # image is malformed" that keeps appearing in merge for every schedule
  # run despite fetch-cloud's Snapshot DB step reporting integrity_check
  # ok. Target-guarded (target=diagnostic only) so schedule runs untouched.
  #
  # Downloads backfill-cloud-<diag_run_id> and runs 3 checks:
  #   1. PRAGMA integrity_check on the downloaded file as-is
  #   2. SELECT COUNT(*) FROM cloud_fraction (main-table read path)
  #   3. ATTACH DATABASE + SELECT FROM overlay.cloud_fraction (same path
  #      merge_checkpoints.py uses)
  #
  # Isolates the fault: snapshot corruption vs transport vs ATTACH-only.
  # =====================================================================
  diagnostic-cloud:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'diagnostic'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      DIAG_RUN_ID: ${{ inputs.diag_run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download cloud.db artifact from diag_run_id
        run: |
          set -e
          mkdir -p /tmp/diag
          echo "Downloading backfill-cloud-${DIAG_RUN_ID}"
          gh run download "${DIAG_RUN_ID}" --repo ${{ github.repository }} \
            --name "backfill-cloud-${DIAG_RUN_ID}" --dir /tmp/diag
          ls -lh /tmp/diag/
          echo "SHA256:"
          sha256sum /tmp/diag/geohazard.db || true
          echo "File size:"
          stat -c '%s bytes' /tmp/diag/geohazard.db
          echo "SQLite header (first 16 bytes):"
          head -c 16 /tmp/diag/geohazard.db | od -c | head -1

      - name: Check 1 -- PRAGMA integrity_check on downloaded file
        id: check1
        continue-on-error: true
        run: |
          set +e
          echo "=== PRAGMA integrity_check (direct sqlite3 CLI) ==="
          sqlite3 /tmp/diag/geohazard.db "PRAGMA integrity_check;" 2>&1 | head -20
          RC=$?
          echo "exit=$RC"
          echo ""
          echo "=== PRAGMA integrity_check (via python3 sqlite3 module) ==="
          python3 -c "
          import sqlite3
          try:
              c = sqlite3.connect('/tmp/diag/geohazard.db')
              r = c.execute('PRAGMA integrity_check').fetchall()
              print('result:', r[:5])
              c.close()
              print('PYTHON_INTEGRITY=ok' if r and r[0][0]=='ok' else 'PYTHON_INTEGRITY=not_ok')
          except Exception as e:
              print(f'PYTHON_INTEGRITY=exception: {type(e).__name__}: {e}')
          "
          echo ""
          echo "=== PRAGMA quick_check (faster, page-level) ==="
          sqlite3 /tmp/diag/geohazard.db "PRAGMA quick_check;" 2>&1 | head -20
          exit 0

      - name: Check 2 -- SELECT COUNT(*) FROM cloud_fraction
        id: check2
        continue-on-error: true
        run: |
          set +e
          echo "=== sqlite3 CLI SELECT COUNT(*) ==="
          sqlite3 /tmp/diag/geohazard.db "SELECT COUNT(*) FROM cloud_fraction;" 2>&1
          RC=$?
          echo "exit=$RC"
          echo ""
          echo "=== python3 SELECT COUNT(*) ==="
          python3 -c "
          import sqlite3
          try:
              c = sqlite3.connect('/tmp/diag/geohazard.db')
              n = c.execute('SELECT COUNT(*) FROM cloud_fraction').fetchone()[0]
              print(f'PYTHON_COUNT={n}')
              c.close()
          except Exception as e:
              print(f'PYTHON_COUNT=exception: {type(e).__name__}: {e}')
          "
          echo ""
          echo "=== Sample 3 rows ==="
          sqlite3 /tmp/diag/geohazard.db "SELECT * FROM cloud_fraction LIMIT 3;" 2>&1 | head -10
          exit 0

      - name: Check 3 -- ATTACH DATABASE path (simulates merge)
        id: check3
        continue-on-error: true
        run: |
          set +e
          echo "=== ATTACH overlay and SELECT (mirrors merge_checkpoints.py) ==="
          # Create a fresh main DB with an empty cloud_fraction, then ATTACH
          # the downloaded cloud.db as overlay and read from it.
          rm -f /tmp/diag_main.db
          python3 -c "
          import sqlite3
          try:
              main = sqlite3.connect('/tmp/diag_main.db')
              main.execute('CREATE TABLE cloud_fraction (id INTEGER PRIMARY KEY, observed_at TEXT, cell_lat REAL, cell_lon REAL, cloud_frac REAL, received_at TEXT)')
              main.commit()
              print('main DB created')
              main.execute('ATTACH DATABASE ? AS overlay', ('/tmp/diag/geohazard.db',))
              print('ATTACH ok')
              n = main.execute('SELECT COUNT(*) FROM overlay.cloud_fraction').fetchone()[0]
              print(f'ATTACH_COUNT={n}')
              # Try the DELETE/INSERT pattern merge uses
              main.execute('BEGIN')
              main.execute('DELETE FROM main.cloud_fraction')
              main.execute('INSERT OR IGNORE INTO main.cloud_fraction SELECT * FROM overlay.cloud_fraction')
              n2 = main.execute('SELECT COUNT(*) FROM main.cloud_fraction').fetchone()[0]
              print(f'AFTER_MERGE_COUNT={n2}')
              main.execute('COMMIT')
              main.execute('DETACH overlay')
              main.close()
              print('FULL_MERGE_PATH=ok')
          except Exception as e:
              print(f'ATTACH_ERROR: {type(e).__name__}: {e}')
          "

      - name: Check 4 -- all tables count + schema sample
        continue-on-error: true
        run: |
          set +e
          echo "=== All tables ==="
          sqlite3 /tmp/diag/geohazard.db ".tables" 2>&1
          echo ""
          echo "=== cloud_fraction schema ==="
          sqlite3 /tmp/diag/geohazard.db ".schema cloud_fraction" 2>&1
          echo ""
          echo "=== Largest 5 tables by row count (best-effort) ==="
          for T in cloud_fraction modis_lst so2_column snet_waveform earthquakes; do
            N=$(sqlite3 /tmp/diag/geohazard.db "SELECT COUNT(*) FROM $T;" 2>&1)
            echo "  $T: $N"
          done

      - name: Summary
        run: |
          echo "=== Diagnostic summary ==="
          echo "check1 (integrity_check): ${{ steps.check1.outcome }}"
          echo "check2 (direct table read): ${{ steps.check2.outcome }}"
          echo "check3 (ATTACH path): ${{ steps.check3.outcome }}"
