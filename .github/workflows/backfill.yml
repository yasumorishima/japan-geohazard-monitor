name: Backfill Data

# Continuous backfill for ALL data tables.
# Runs every 3 hours around the clock until 100% coverage is reached.
#
# 2026-04-18: further split into per-fetcher parallel jobs. Earlier
# heavy/light split still hit the 5h GitHub job limit because MODIS LST +
# SO2 + cloud_fraction serialised inside one heavy job drifted to ~4h52m
# before timeout and consistently got cancelled mid-cloud_fraction on
# schedule runs. 5 parallel fetch jobs + light + merge keeps any single
# fetcher's runaway from taking out the whole batch.
#
# Topology:
#   fetch-modis  (timeout 150m): MODIS LST           -> modis.db artifact
#   fetch-so2    (timeout 120m): OMI SO2 column      -> so2.db artifact
#   fetch-cloud  (timeout 120m): MODIS cloud_frac    -> cloud.db artifact
#   fetch-snet   (timeout 240m): win32tools install
#                                 + S-net waveform
#                                 + S-net pressure   -> snet.db artifact
#   light        (timeout 200m): remaining ~26 fetchers -> light.db artifact
#   merge        (timeout 60m):  needs all 5 above, runs
#                                 scripts/merge_checkpoints.py with light
#                                 as base and 4 overlays.
#                                 Then Snapshot / Coverage / Upload
#                                 checkpoint (target ガード) / Upload BQ
#                                 (target ガード) / Discord / Issue.
#
# If a fetch job is target-skipped (workflow_dispatch with a specific
# target) or cancelled / fails, its overlay artifact is absent and
# merge_checkpoints.py leaves those tables as the base's
# prior-checkpoint rows (no BQ regression).
#
# Disable this workflow once coverage reaches 100%.

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 00:00 = JST 09:00
    - cron: '0 3 * * *'    # UTC 03:00 = JST 12:00
    - cron: '0 6 * * *'    # UTC 06:00 = JST 15:00
    - cron: '0 9 * * *'    # UTC 09:00 = JST 18:00
    - cron: '0 12 * * *'   # UTC 12:00 = JST 21:00
    - cron: '0 15 * * *'   # UTC 15:00 = JST 00:00
    - cron: '0 18 * * *'   # UTC 18:00 = JST 03:00
    - cron: '0 21 * * *'   # UTC 21:00 = JST 06:00
  workflow_dispatch:
    inputs:
      memo:
        description: 'Why this run'
        required: false
      target:
        description: 'Which fetcher (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - earthquakes
          - tec
          - kp
          - cmt
          - snet_waveform
          - snet_pressure
          - gnss_tec
          - modis_lst
          - ulf
          - cosmic_ray
          - lightning
          - iss_lis
          - wwlln_thunder_hour
          - lis_otd_monthly
          - geomag
          - olr
          - iers
          - solar_wind
          - grace
          - so2
          - cloud
          - nightlight
          - goes_xray
          - goes_proton
          - tidal_stress
          - particle_flux
          - dart
          - ioc_sealevel
          - tide_gauge
          - soil_moisture
          - ocean_color
          - diagnostic
      diag_run_id:
        description: 'target=diagnostic 専用: 調査対象の run ID (backfill-cloud-<id>)'
        required: false
        default: '24614238401'

permissions:
  contents: read
  issues: write

# Reusable shell snippets are inlined per job below; YAML anchors aren't
# supported by GitHub Actions across step blocks, so duplication is
# unavoidable for restore/init/snapshot steps.

jobs:
  # =====================================================================
  # FETCH-MODIS — MODIS LST only. Typical runtime ~70min; timeout 150m
  # leaves slack for Phase 2 random-control fetches.
  # =====================================================================
  fetch-modis:
    if: >-
      github.event_name == 'schedule'
      || inputs.target == 'all'
      || inputs.target == ''
      || inputs.target == 'modis_lst'
    runs-on: ubuntu-latest
    timeout-minutes: 150
    outputs:
      fetch_modis_lst: ${{ steps.fetch_modis_lst.outcome }}
      snapshot_outcome: ${{ steps.snapshot.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite numpy scipy netCDF4 google-cloud-bigquery pyarrow scikit-learn h5py
          sudo apt-get install -y ncompress

      - name: Restore previous database checkpoint
        id: restore
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash {0}
        run: |
          set +e
          mkdir -p data results
          RESTORED=""
          MAX_TRIES=30
          for PREFIX in "backfill-checkpoint-" "database-checkpoint-"; do
            [ -n "$RESTORED" ] && break
            RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name | startswith(\"${PREFIX}\")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0:${MAX_TRIES}] | .[].workflow_run.id" 2>/dev/null)
            for PREV_RUN in $RUN_IDS; do
              [ -z "$PREV_RUN" ] && continue
              case "$PREV_RUN" in (*[!0-9]*) continue;; esac
              [ "$PREV_RUN" = "${{ github.run_id }}" ] && continue
              ARTIFACT_NAME="${PREFIX}${PREV_RUN}"
              echo "Trying artifact: $ARTIFACT_NAME"
              rm -rf /tmp/db-restore
              gh run download "$PREV_RUN" --repo ${{ github.repository }} \
                --name "$ARTIFACT_NAME" --dir /tmp/db-restore 2>/dev/null
              if [ $? -ne 0 ]; then
                echo "  download failed -- skip"
                continue
              fi
              DB_FILE="/tmp/db-restore/geohazard.db"
              [ ! -f "$DB_FILE" ] && DB_FILE="/tmp/db-restore/data/geohazard.db"
              if [ ! -f "$DB_FILE" ]; then
                echo "  no geohazard.db in artifact -- skip"
                continue
              fi
              cp "$DB_FILE" data/geohazard.db
              rm -f data/geohazard.db-wal data/geohazard.db-shm
              DB_SIZE=$(du -h data/geohazard.db | cut -f1)
              echo "  copied ($DB_SIZE) -- checking integrity"
              python3 scripts/check_db_integrity.py data/geohazard.db
              if [ $? -eq 0 ]; then
                RESTORED="${ARTIFACT_NAME}"
                echo "restored=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
                echo "Restored from $ARTIFACT_NAME"
                break
              else
                echo "  corrupted -- attempting per-table salvage"
                python3 scripts/salvage_db.py --src data/geohazard.db --dst /tmp/salvaged.db
                if [ $? -eq 0 ] && [ -f /tmp/salvaged.db ]; then
                  rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
                  mv /tmp/salvaged.db data/geohazard.db
                  RESTORED="${ARTIFACT_NAME}-salvaged"
                  echo "restored=${ARTIFACT_NAME}-salvaged" >> "$GITHUB_OUTPUT"
                  echo "Salvaged via per-table copy from $ARTIFACT_NAME"
                  break
                fi
                echo "  salvage failed -- trying next artifact"
                rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm /tmp/salvaged.db
              fi
            done
          done
          if [ -z "$RESTORED" ]; then
            echo "No usable checkpoint found -- will init fresh DB"
          fi
          exit 0

      - name: Init DB if missing or corrupt
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        shell: bash {0}
        run: |
          set +e
          NEEDS_INIT=0
          if [ ! -f data/geohazard.db ]; then
            NEEDS_INIT=1
            echo "No DB file -- will init"
          else
            python3 scripts/check_db_integrity.py data/geohazard.db > /dev/null
            if [ $? -ne 0 ]; then
              echo "Existing DB is corrupt -- removing and re-initialising"
              rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
              NEEDS_INIT=1
            fi
          fi
          if [ "$NEEDS_INIT" = "1" ]; then
            python3 -c "
          import asyncio, sys
          sys.path.insert(0, 'src')
          from db import init_db
          asyncio.run(init_db())
          print('DB initialised')
          "
            if [ $? -ne 0 ]; then
              echo "::error::init_db failed"
              exit 1
            fi
          fi

      - name: Fetch MODIS LST (thermal anomaly discovery)
        id: fetch_modis_lst
        if: inputs.target == 'all' || inputs.target == 'modis_lst' || inputs.target == ''
        continue-on-error: true
        timeout-minutes: 120
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_modis_lst.py || echo "MODIS LST discovery completed"

      - name: Snapshot DB
        id: snapshot
        if: always()
        run: |
          python3 -c "
          import sqlite3, sys
          try:
              src = sqlite3.connect('data/geohazard.db')
              src.execute('PRAGMA wal_checkpoint(TRUNCATE)')
              r = src.execute('PRAGMA integrity_check').fetchone()[0]
              if r != 'ok':
                  print(f'REFUSING to snapshot corrupt DB: {r[:200]}')
                  src.close()
                  sys.exit(1)
              dst = sqlite3.connect('data/geohazard_snapshot.db')
              src.backup(dst)
              dst.close()
              src.close()
              verify = sqlite3.connect('data/geohazard_snapshot.db')
              r2 = verify.execute('PRAGMA integrity_check').fetchone()[0]
              verify.close()
              if r2 != 'ok':
                  print(f'REFUSING to upload corrupt snapshot (post-backup): {r2[:200]}')
                  sys.exit(1)
              print('Snapshot created (post-integrity-check + post-backup verify)')
          except Exception as e:
              print(f'Snapshot failed: {e}')
              sys.exit(1)
          "
          if [ -f data/geohazard_snapshot.db ]; then
            mv data/geohazard_snapshot.db data/geohazard.db
          fi

      - name: Upload modis.db artifact
        if: always() && steps.snapshot.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: backfill-modis-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 7

  # =====================================================================
  # FETCH-SO2 — OMI SO2 only. Requires Earthdata auth.
  # =====================================================================
  fetch-so2:
    if: >-
      github.event_name == 'schedule'
      || inputs.target == 'all'
      || inputs.target == ''
      || inputs.target == 'so2'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      fetch_so2: ${{ steps.fetch_so2.outcome }}
      snapshot_outcome: ${{ steps.snapshot.outcome }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite numpy scipy netCDF4 google-cloud-bigquery pyarrow scikit-learn h5py
          sudo apt-get install -y ncompress

      - name: Restore previous database checkpoint
        id: restore
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash {0}
        run: |
          set +e
          mkdir -p data results
          RESTORED=""
          MAX_TRIES=30
          for PREFIX in "backfill-checkpoint-" "database-checkpoint-"; do
            [ -n "$RESTORED" ] && break
            RUN_IDS=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select(.name | startswith(\"${PREFIX}\")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0:${MAX_TRIES}] | .[].workflow_run.id" 2>/dev/null)
            for PREV_RUN in $RUN_IDS; do
              [ -z "$PREV_RUN" ] && continue
              case "$PREV_RUN" in (*[!0-9]*) continue;; esac
              [ "$PREV_RUN" = "${{ github.run_id }}" ] && continue
              ARTIFACT_NAME="${PREFIX}${PREV_RUN}"
              echo "Trying artifact: $ARTIFACT_NAME"
              rm -rf /tmp/db-restore
              gh run download "$PREV_RUN" --repo ${{ github.repository }} \
