name: obp-request
on:
  workflow_dispatch:
    inputs:
      memo:
        description: intent of this manual run
        required: true
      submit_limit:
        description: windows to submit (int) / "tiny" (10sta 60min test) / "probe"
        required: true
        default: "1"
jobs:
  request:
    runs-on: [self-hosted, geohazard-obp]
    steps:
      - name: submit OBP data requests on RPi5
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          SUBMIT_LIMIT: ${{ github.event.inputs.submit_limit }}
        run: /home/yasu/geo-ml/venv/bin/python /home/yasu/geo-ml/obp/obp_request.py
