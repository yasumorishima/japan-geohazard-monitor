name: Probe Hi-net Channels

on:
  workflow_dispatch:
    inputs:
      memo:
        description: "Run intent (required)"
        required: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install HinetPy obspy numpy
      - name: Build win32tools (catwin32 + win2sac_32)
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          python3 -c "from HinetPy import Client; Client('${HINET_USER}', '${HINET_PASS}')._get_win32tools()" || exit 1
          if [ -f win32tools.tar.gz ]; then
            tar -xf win32tools.tar.gz && rm win32tools.tar.gz
            cd win32tools && make && mkdir -p bin && mv catwin32.src/catwin32 win2sac.src/win2sac_32 bin/ && cd ..
            echo "${{ github.workspace }}/win32tools/bin" >> $GITHUB_PATH
          else
            echo "win32tools.tar.gz not produced"; exit 1
          fi
      - name: Probe channels
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: python scripts/probe_hinet_channels.py
