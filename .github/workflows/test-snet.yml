name: Test S-net Authentication

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'What are you testing?'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install HinetPy numpy aiosqlite aiohttp

      - name: Full S-net pipeline test
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data results
          python3 scripts/test_snet_pipeline.py 2>&1 | tee results/snet_test.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snet-test-${{ github.run_id }}
          path: results/snet_test.txt
          retention-days: 30
