name: Test S-net Authentication

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'What are you testing?'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install HinetPy numpy aiosqlite aiohttp

      - name: DB checkpoint preflight test
        run: python3 scripts/test_db_checkpoint.py

      - name: Install win32tools (catwin32 + win2sac_32)
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          python3 -c "from HinetPy import Client; Client('${{ secrets.HINET_USER }}', '${{ secrets.HINET_PASS }}')._get_win32tools()"
          tar -xf win32tools.tar.gz && rm win32tools.tar.gz
          cd win32tools && make && mkdir -p bin && mv catwin32.src/catwin32 win2sac.src/win2sac_32 bin/ && cd ..
          echo "${{ github.workspace }}/win32tools/bin" >> $GITHUB_PATH
          echo "Installed: $(which catwin32) $(which win2sac_32 2>/dev/null || echo 'win2sac_32 not in PATH yet')"

      - name: Full S-net pipeline test
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data results
          python3 scripts/test_snet_pipeline.py 2>&1 | tee results/snet_test.txt

      - name: Waveform feature extraction test (Phase 18)
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/test_snet_waveform.py 2>&1 | tee results/snet_waveform_test.txt

      - name: Smoke test — real fetch_snet_waveform.py (2 requests only)
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          SNET_MAX_REQUESTS: "5"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          mkdir -p data results
          # Run the ACTUAL production script with 2-request cap
          python3 scripts/fetch_snet_waveform.py 2>&1 | tee results/snet_smoke_test.txt
          # Verify records were inserted
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('data/geohazard.db')
          rows = conn.execute('SELECT COUNT(*) FROM snet_waveform').fetchone()[0]
          sensors = conn.execute('SELECT sensor_type, COUNT(*) FROM snet_waveform GROUP BY sensor_type').fetchall()
          print(f'Total rows: {rows}')
          for s, c in sensors:
              print(f'  {s}: {c}')
          assert rows > 0, 'FAIL: No records inserted by production script'
          print('PASS: Production smoke test OK')
          conn.close()
          " 2>&1 | tee -a results/snet_smoke_test.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snet-test-${{ github.run_id }}
          path: |
            results/snet_test.txt
            results/snet_waveform_test.txt
            results/snet_smoke_test.txt
          retention-days: 30

      - name: Notify Discord
        if: always()
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="✅ S-net Pipeline Test PASSED"
            COLOR=3066993
          else
            TITLE="❌ S-net Pipeline Test FAILED"
            COLOR=15158332
          fi
          # Extract summary line from test output
          SUMMARY=$(grep -E "Results:|FINAL SUMMARY" results/snet_test.txt 2>/dev/null | head -1 || echo "See logs")
          COUNTS=$(grep -E "^  Results:" results/snet_test.txt 2>/dev/null | head -1 || echo "")
          if [ -z "$COUNTS" ]; then
            COUNTS=$(tail -20 results/snet_test.txt 2>/dev/null | grep -E "OK|FAIL|WARN" | head -1 || echo "Check artifact")
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Results\", \"value\": \"$COUNTS\", \"inline\": false},
                  {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"S-net Pipeline Test\"}
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
