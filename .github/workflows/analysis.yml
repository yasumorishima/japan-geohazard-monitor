name: Earthquake Correlation Analysis

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3:00 UTC (12:00 JST)
  workflow_dispatch:
    inputs:
      memo:
        description: 'What are you running and why?'
        required: true
      min_mag:
        description: 'Minimum magnitude for target earthquakes'
        required: false
        default: '5.0'
      analysis_type:
        description: 'Analysis type: all | bvalue | tec | lag | multi | advanced'
        required: false
        default: 'all'

jobs:
  # ====== JOB 1: FETCH ======
  # Data collection + validation + gap diagnosis.
  # Runs independently with its own 6-hour budget.
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # Must be < GitHub's 360min hard limit so if: always() steps can save DB

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite scikit-learn scipy numpy netCDF4
          sudo apt-get install -y ncompress  # For .Z IONEX decompression

      # ====== DB PREFLIGHT TEST ======
      # Run checkpoint integrity tests BEFORE touching any real data.
      # Catches SQLite/OS-level issues that caused 3 production DB corruptions.
      - name: DB checkpoint preflight test
        run: |
          python3 scripts/test_db_checkpoint.py

      # ====== RESTORE PREVIOUS DB CHECKPOINT ======
      # Incremental fetch: restore previous run's DB so skip-logic kicks in
      # (e.g., fetch_poes_particles.py skips years with >300 records)
      - name: Restore previous database checkpoint
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          PREV_RUN=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name | startswith("database-checkpoint-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty' 2>/dev/null)
          if [ -n "$PREV_RUN" ] && [ "$PREV_RUN" != "${{ github.run_id }}" ]; then
            echo "Downloading DB checkpoint from run $PREV_RUN..."
            gh run download "$PREV_RUN" --repo ${{ github.repository }} \
              --name "database-checkpoint-$PREV_RUN" \
              --dir /tmp/db-restore 2>/dev/null || true
            if [ -f /tmp/db-restore/data/geohazard.db ]; then
              cp /tmp/db-restore/data/geohazard.db data/geohazard.db
              # Remove stale WAL/SHM files that cause "malformed" errors
              rm -f data/geohazard.db-wal data/geohazard.db-shm
              DB_SIZE=$(du -h data/geohazard.db | cut -f1)
              echo "Restored DB from run $PREV_RUN ($DB_SIZE) — running integrity check..."
              # NOTE: bash -e kills the script on non-zero exit, so we must
              # capture the exit code explicitly to reach the cleanup block.
              set +e
              python3 -c "
          import sqlite3, sys
          conn = sqlite3.connect('data/geohazard.db')
          result = conn.execute('PRAGMA integrity_check').fetchone()[0]
          if result != 'ok':
              print(f'❌ DB integrity check FAILED: {result}')
              conn.close()
              sys.exit(1)
          tables = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()
          for t in tables:
              count = conn.execute(f'SELECT COUNT(*) FROM {t[0]}').fetchone()[0]
              print(f'  {t[0]}: {count:,} rows')
          conn.close()
          print('✅ DB integrity check passed')
          "
              INTEGRITY_RC=$?
              set -e
              if [ $INTEGRITY_RC -ne 0 ]; then
                echo "⚠️ Corrupted checkpoint — deleting and starting fresh"
                rm -f data/geohazard.db data/geohazard.db-wal data/geohazard.db-shm
                echo "🗑️ Deleted corrupted DB ($DB_SIZE)"
              fi
            else
              echo "⚠️ No DB file in checkpoint artifact"
            fi
          else
            echo "No previous checkpoint found — starting fresh"
          fi

      - name: Validate Earthdata credentials
        id: earthdata_check
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          if python3 scripts/test_earthdata_auth.py; then
            echo "earthdata_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "earthdata_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Earthdata auth FAILED — cloud_fraction, SO2, nightlight, ISS LIS will be SKIPPED"
            echo "### ⚠️ Earthdata Auth Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "cloud_fraction, SO2, nightlight, ISS LIS sources will be skipped this run." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true

      - name: Fetch earthquake data (M3+, 2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data
          python3 scripts/fetch_earthquakes.py

      - name: Fetch TEC data (major events ±7 days)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode event

      - name: Fetch TEC random baseline (±7 days around 300 random dates)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode random --n-dates 300

      - name: Fetch Kp data (2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kp.py

      - name: Fetch CMT focal mechanisms (GCMT, 2011-present)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cmt.py

      # ====== S-NET (PRIORITY — Phase 19) ======
      # Moved before slow Earthdata fetchers to ensure S-net always runs
      # within the 6h budget. Previously placed last, never reached.
      - name: Install win32tools for S-net (catwin32 + win2sac_32)
        continue-on-error: true
        timeout-minutes: 5
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          if [ -z "$HINET_USER" ] || [ -z "$HINET_PASS" ]; then
            echo "HINET credentials not set, skipping win32tools"
            exit 0
          fi
          pip install HinetPy 2>/dev/null || true
          python3 -c "from HinetPy import Client; Client('${HINET_USER}', '${HINET_PASS}')._get_win32tools()" || exit 0
          if [ -f win32tools.tar.gz ]; then
            tar -xf win32tools.tar.gz && rm win32tools.tar.gz
            cd win32tools && make && mkdir -p bin && mv catwin32.src/catwin32 win2sac.src/win2sac_32 bin/ && cd ..
            echo "${{ github.workspace }}/win32tools/bin" >> $GITHUB_PATH
          fi

      - name: Fetch S-net multi-sensor waveform features (Phase 19)
        continue-on-error: true
        timeout-minutes: 150
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install HinetPy 2>/dev/null || true
          python3 scripts/fetch_snet_waveform.py || echo "S-net waveform fetch failed (non-fatal)"
          # Copy coverage report to results for artifact
          if [ -f results/snet_coverage.json ]; then
            mkdir -p results/midrun
            cp results/snet_coverage.json results/midrun/
          fi

      - name: Fetch GNSS-TEC high-resolution data (Nagoya University ISEE)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4 2>/dev/null || pip install scipy 2>/dev/null || true
          python3 scripts/fetch_gnss_tec.py || echo "GNSS-TEC fetch non-fatal failure"

      - name: Fetch MODIS LST (thermal anomaly discovery)
        continue-on-error: true
        timeout-minutes: 45
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_modis_lst.py || echo "MODIS LST discovery completed (may need Earthdata auth for full download)"

      - name: Fetch Kakioka ULF magnetic data
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kakioka_ulf.py || echo "ULF fetch completed (may need WDC registration for full access)"

      # --- Phase 9: Non-traditional precursor data sources ---

      - name: Fetch NMDB cosmic ray data (Homola et al. 2023)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_nmdb_cosmicray.py || echo "NMDB fetch failed (non-fatal)"

      - name: Fetch Blitzortung lightning data
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_blitzortung.py || echo "Lightning fetch failed (non-fatal)"

      - name: Fetch ISS LIS lightning data (Earthdata auth, 2017-2023)
        continue-on-error: true
        timeout-minutes: 20
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install netCDF4 2>/dev/null || true
          python3 scripts/fetch_iss_lis_lightning.py || echo "ISS LIS fetch failed (non-fatal)"

      - name: Fetch INTERMAGNET hourly + CSES satellite EM data
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cses_satellite.py || echo "Satellite EM fetch failed (non-fatal)"

      - name: Fetch Movebank animal tracking data
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          MOVEBANK_USER: ${{ secrets.MOVEBANK_USER }}
          MOVEBANK_PASS: ${{ secrets.MOVEBANK_PASS }}
        run: |
          python3 scripts/fetch_movebank.py || echo "Movebank fetch failed (non-fatal)"

      # --- Phase 10: Unconventional data sources ---

      - name: Fetch NOAA OLR daily (thermal anomaly, no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4
          python3 scripts/fetch_olr.py || echo "OLR fetch failed (non-fatal)"

      - name: Fetch IERS Earth Orientation Parameters (no auth)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_iers_eop.py || echo "IERS EOP fetch failed (non-fatal)"

      - name: Fetch NASA OMNIWeb solar wind hourly (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_solar_wind.py || echo "Solar wind fetch failed (non-fatal)"

      - name: Fetch GRACE/GRACE-FO gravity anomaly (Earthdata auth optional)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_grace_gravity.py || echo "GRACE fetch failed (non-fatal)"

      - name: Fetch OMI SO2 column data (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 30
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_omi_so2.py || echo "SO2 fetch failed (non-fatal)"

      # SMAP disabled: NOAA ERDDAP permanently blacklists GitHub Actions IPs (403).
      # DB-restored data is still usable. Re-enable if ERDDAP block is lifted.
      # - name: Fetch SMAP soil moisture (Earthdata auth optional)
      #   continue-on-error: true
      #   timeout-minutes: 20
      #   env:
      #     GEOHAZARD_DB_PATH: ./data/geohazard.db
      #   run: |
      #     python3 scripts/fetch_smap_moisture.py || echo "SMAP fetch failed (non-fatal)"

      # --- Phase 10b: Additional unconventional sources ---

      - name: Fetch UHSLC tide gauge data (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tide_gauge.py || echo "Tide gauge fetch failed (non-fatal)"

      - name: Fetch NASA ocean color chlorophyll-a (Earthdata auth optional)
        continue-on-error: true
        timeout-minutes: 40
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_ocean_color.py || echo "Ocean color fetch failed (non-fatal)"

      - name: Fetch MODIS cloud fraction (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 30
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_cloud_fraction.py || echo "Cloud fraction fetch failed (non-fatal)"

      - name: Fetch VIIRS nighttime light/airglow (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 20
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install h5py 2>/dev/null || true
          python3 scripts/fetch_viirs_nighttime.py || echo "VIIRS fetch failed (non-fatal)"

      # InSAR disabled: LiCSAR has Japan frame definitions but no processed
      # interferograms (verified 2026-03-20). Re-enable when data becomes available.
      # - name: Fetch InSAR deformation (COMET LiCSAR)
      #   env:
      #     GEOHAZARD_DB_PATH: ./data/geohazard.db
      #   run: |
      #     pip install rasterio 2>/dev/null || true
      #     python3 scripts/fetch_insar.py || echo "InSAR fetch failed (non-fatal)"

      # --- Phase 11: Space/cosmic data sources ---

      - name: Fetch GOES X-ray flux (solar flares, no auth)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_xray.py || echo "GOES X-ray fetch failed (non-fatal)"

      - name: Fetch GOES proton flux (SEP events, no auth)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_proton.py || echo "GOES proton fetch failed (non-fatal)"

      - name: Compute tidal stress (lunar+solar, pure calculation)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tidal_stress.py || echo "Tidal stress computation failed (non-fatal)"

      - name: Fetch GOES electron flux (particle precipitation, no auth)
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_poes_particles.py || echo "Particle flux fetch failed (non-fatal)"

      - name: Fetch NOAA DART ocean bottom pressure (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_dart_pressure.py || echo "DART pressure fetch failed (non-fatal)"

      - name: Fetch IOC sea level monitoring (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_ioc_sealevel.py || echo "IOC sea level fetch failed (non-fatal)"

      # ====== DATA PRESERVATION CHECKPOINT ======
      # All fetch steps complete. Validate + diagnose + save DB.

      - name: Download previous validation report
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find most recent successful artifact with validation data
          PREV_RUN=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name | startswith("database-checkpoint-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty' 2>/dev/null)
          if [ -n "$PREV_RUN" ] && [ "$PREV_RUN" != "${{ github.run_id }}" ]; then
            gh run download "$PREV_RUN" --repo ${{ github.repository }} \
              --name "database-checkpoint-$PREV_RUN" \
              --dir /tmp/prev-checkpoint 2>/dev/null || true
            if [ -f /tmp/prev-checkpoint/results/data_validation.json ]; then
              cp /tmp/prev-checkpoint/results/data_validation.json /tmp/prev_validation.json
              echo "Previous validation report found (run $PREV_RUN)"
            fi
          fi

      - name: Validate data completeness
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          PREV_FLAG=""
          if [ -f /tmp/prev_validation.json ]; then
            PREV_FLAG="--previous /tmp/prev_validation.json"
          fi
          python3 scripts/validate_data.py $PREV_FLAG

      - name: Diagnose data gaps
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/diagnose_data_gaps.py --db ./data/geohazard.db --json --ci

      - name: Notify Discord — fetch phase complete
        if: always()
        run: |
          mkdir -p results/midrun
          # Extract full validation report
          python3 -c "
          import json, pathlib
          p = pathlib.Path('results/data_validation.json')
          if not p.exists():
              open('results/midrun/fetch_report.txt', 'w').write('Validation not available\n')
              exit()
          d = json.loads(p.read_text())
          ok = d.get('ok', 0)
          low = d.get('low', 0)
          empty = d.get('empty', 0)
          missing = d.get('missing', 0)
          total = d.get('total_tables', '?')
          status = d.get('status', '?')
          summary = f'{ok} OK / {low} LOW / {empty} EMPTY / {missing} MISSING (of {total})'
          # Categorize problem tables with coverage info
          tables = d.get('tables', {})
          problems = []
          low_coverage = []
          for name, info in sorted(tables.items()):
              s = info.get('status', 'UNKNOWN')
              rows = info.get('rows', 0)
              cov = info.get('coverage_pct')
              if s in ('EMPTY', 'MISSING'):
                  problems.append(f'{name}: {s}')
              elif s == 'LOW':
                  cov_str = f', coverage {cov}%' if cov is not None else ''
                  problems.append(f'{name}: LOW ({rows} rows{cov_str})')
              # Flag OK tables with low coverage (data gaps)
              if s == 'OK' and cov is not None and cov < 70:
                  low_coverage.append(f'{name}: {rows:,} rows, coverage {cov}%')
          # Build report file
          lines = [
              f'=== Fetch Phase Complete ===',
              f'Status: {status}',
              f'Summary: {summary}',
              '',
          ]
          if problems:
              lines.append('Problem tables (EMPTY/MISSING/LOW):')
              lines.extend(f'  - {p}' for p in problems)
          else:
              lines.append('No EMPTY/MISSING/LOW tables')
          if low_coverage:
              lines.append('')
              lines.append('Low coverage (<70%) — data gaps:')
              lines.extend(f'  - {lc}' for lc in low_coverage)
          lines.append('')
          # All tables summary
          lines.append('All tables:')
          for name, info in sorted(tables.items()):
              rows = info.get('rows', 0)
              s = info.get('status', '?')
              cov = info.get('coverage_pct')
              cov_str = f' cov={cov}%' if cov is not None else ''
              lines.append(f'  {s:7s} {name}: {rows:,} rows{cov_str}')
          report = '\n'.join(lines)
          pathlib.Path('results/midrun/fetch_report.txt').write_text(report + '\n')
          # Discord-friendly strings
          pathlib.Path('/tmp/notify_summary.txt').write_text(summary)
          # Combine problems + low coverage for Discord
          all_issues = problems[:]
          if low_coverage:
              all_issues.append('--- Low coverage ---')
              all_issues.extend(low_coverage)
          issue_str = '\n'.join(all_issues[:15]) if all_issues else 'All healthy'
          pathlib.Path('/tmp/notify_problems.txt').write_text(issue_str)
          "
          # Copy reports for artifact
          if [ -f results/data_validation.json ]; then
            cp results/data_validation.json results/midrun/
          fi
          if [ -f results/data_gaps.json ]; then
            cp results/data_gaps.json results/midrun/
          fi
          SUMMARY=$(cat /tmp/notify_summary.txt 2>/dev/null || echo "Stats unavailable")
          PROBLEMS=$(cat /tmp/notify_problems.txt 2>/dev/null || echo "Unknown")
          echo "::notice::Fetch phase: $SUMMARY"
          # Discord notification
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -w "\nHTTP %{http_code}\n" -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"📡 Fetch Phase Complete\",
                  \"color\": 3447003,
                  \"fields\": [
                    {\"name\": \"Summary\", \"value\": \"$SUMMARY\", \"inline\": false},
                    {\"name\": \"Problems\", \"value\": \"$PROBLEMS\", \"inline\": false},
                    {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                  ],
                  \"footer\": {\"text\": \"Analyze job starting next\"}
                }]
              }"
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        continue-on-error: true

      - name: Snapshot DB via backup API for checkpoint upload
        id: wal_flush
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          mkdir -p results/midrun
          SNAPSHOT_LOG=results/midrun/snapshot.log
          : > "$SNAPSHOT_LOG"

          log() { echo "$@" | tee -a "$SNAPSHOT_LOG"; }

          if [ ! -f data/geohazard.db ]; then
            log "::error::No DB file at data/geohazard.db — nothing to snapshot"
            echo "flush_ok=false" >> "$GITHUB_OUTPUT"
            echo "flush_reason=no-db-file" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          log "=== Pre-snapshot diagnostics ==="
          log "--- ps: python-related processes still alive ---"
          ps -eo pid,ppid,etime,stat,cmd | grep -E '[pP]ython' 2>&1 | tee -a "$SNAPSHOT_LOG" || log "(none)"
          log "--- lsof on data/geohazard.db ---"
          lsof data/geohazard.db 2>&1 | tee -a "$SNAPSHOT_LOG" || log "(lsof found nothing or not installed)"
          log "--- WAL/SHM/DB sizes before snapshot ---"
          ls -la data/geohazard.db* 2>&1 | tee -a "$SNAPSHOT_LOG" || true
          log "--- Disk free ---"
          df -h /tmp . 2>&1 | tee -a "$SNAPSHOT_LOG" || true

          # Kill any orphan workers touching the DB (defense in depth). This
          # step runs as bash; the python snapshot below launches fresh. We
          # match scripts/* to catch both fetch_ and backfill_ and any analysis
          # script that may have leaked into a background thread.
          log "--- Killing any orphan scripts/* processes ---"
          pkill -9 -f 'scripts/fetch_' 2>&1 | tee -a "$SNAPSHOT_LOG" || true
          pkill -9 -f 'scripts/backfill_' 2>&1 | tee -a "$SNAPSHOT_LOG" || true
          pkill -9 -f 'scripts/' 2>&1 | tee -a "$SNAPSHOT_LOG" || true
          sleep 1
          log "--- After pkill: python processes still alive ---"
          ps -eo pid,ppid,etime,stat,cmd | grep -E '[pP]ython' 2>&1 | tee -a "$SNAPSHOT_LOG" || log "(none)"

          # Take pre-snapshot row counts on the live DB so we can verify
          # the backup captured everything.
          log "=== Pre-snapshot row counts (source) ==="
          python3 -c "
          import sqlite3, json, pathlib
          src = sqlite3.connect('data/geohazard.db', timeout=60.0)
          src.execute('PRAGMA busy_timeout = 60000')
          tables = [r[0] for r in src.execute(\"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\").fetchall()]
          counts = {}
          for t in tables:
              try:
                  counts[t] = src.execute(f'SELECT COUNT(*) FROM [{t}]').fetchone()[0]
              except Exception as e:
                  counts[t] = f'ERROR: {e}'
          src.close()
          pathlib.Path('/tmp/src_counts.json').write_text(json.dumps(counts, indent=2, default=str))
          width = max(len(t) for t in tables) if tables else 0
          for t in tables:
              c = counts[t]
              print(f'  {t:<{width}s} = {c:>15}' if isinstance(c, int) else f'  {t:<{width}s} = {c}')
          print(f'  TOTAL tables: {len(tables)}')
          " 2>&1 | tee -a "$SNAPSHOT_LOG"

          # Use SQLite's backup API to make a consistent hot copy of the live
          # DB. Works even if another connection holds the WAL because the
          # backup API reads the committed state page-by-page under a shared
          # lock and writes a fresh destination file with no WAL dependency.
          log "=== Running backup API snapshot ==="
          set +e
          python3 -c "
          import sqlite3, sys, os, shutil, json, pathlib, time

          src_path = 'data/geohazard.db'
          dst_path = '/tmp/geohazard_clean.db'

          for p in (dst_path, dst_path + '-wal', dst_path + '-shm', dst_path + '-journal'):
              if os.path.exists(p):
                  os.remove(p)

          t0 = time.time()
          src = sqlite3.connect(src_path, timeout=120.0)
          src.execute('PRAGMA busy_timeout = 120000')
          try:
              busy, log_pages, ckpt = src.execute('PRAGMA wal_checkpoint(PASSIVE)').fetchone()
              print(f'Passive checkpoint: busy={busy}, log={log_pages}, checkpointed={ckpt}')
          except sqlite3.OperationalError as e:
              print(f'Passive checkpoint skipped: {e}')

          dst = sqlite3.connect(dst_path)
          pages_copied = [0]
          def progress(status, remaining, total):
              pages_copied[0] = total - remaining
              if total > 0 and (remaining == 0 or pages_copied[0] % 50000 == 0):
                  pct = 100.0 * pages_copied[0] / total
                  print(f'  backup progress: {pages_copied[0]:,}/{total:,} pages ({pct:.1f}%)')
          src.backup(dst, pages=10000, progress=progress)
          dst.close()
          src.close()
          elapsed = time.time() - t0
          print(f'Backup finished in {elapsed:.1f}s')

          # Verify the clean copy
          verify = sqlite3.connect(dst_path)
          integrity = verify.execute('PRAGMA integrity_check').fetchone()[0]
          if integrity != 'ok':
              print(f'::error::Clean copy integrity FAILED: {integrity[:200]}')
              verify.close()
              sys.exit(2)

          page_size = verify.execute('PRAGMA page_size').fetchone()[0]
          page_count = verify.execute('PRAGMA page_count').fetchone()[0]
          expected = page_size * page_count
          actual = os.path.getsize(dst_path)
          if actual != expected:
              print(f'::error::Clean copy size mismatch: file={actual}, expected={expected}')
              verify.close()
              sys.exit(3)

          tables = [r[0] for r in verify.execute(\"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\").fetchall()]
          if len(tables) < 5:
              print(f'::error::Clean copy has only {len(tables)} tables — suspicious')
              verify.close()
              sys.exit(4)

          # Row-count parity check against source
          dst_counts = {}
          for t in tables:
              try:
                  dst_counts[t] = verify.execute(f'SELECT COUNT(*) FROM [{t}]').fetchone()[0]
              except Exception as e:
                  dst_counts[t] = f'ERROR: {e}'
          verify.close()

          src_counts = json.loads(pathlib.Path('/tmp/src_counts.json').read_text())
          mismatches = []
          for t in tables:
              s = src_counts.get(t)
              d = dst_counts.get(t)
              if isinstance(s, int) and isinstance(d, int) and s != d:
                  mismatches.append((t, s, d))
          if mismatches:
              print(f'::warning::Row count mismatch between source and clean copy:')
              for t, s, d in mismatches:
                  print(f'  {t}: source={s} clean={d} diff={d-s}')
              # A strict failure would be if clean copy has FEWER rows than source
              losses = [(t, s, d) for t, s, d in mismatches if d < s]
              if losses:
                  print(f'::error::Clean copy LOST rows vs source:')
                  for t, s, d in losses:
                      print(f'  {t}: lost {s - d} rows')
                  sys.exit(5)

          print(f'✅ Clean copy OK — {actual:,} bytes, {page_count} pages, {len(tables)} tables')
          pathlib.Path('/tmp/dst_counts.json').write_text(json.dumps(dst_counts, indent=2, default=str))

          # Replace the source file with the clean copy
          for stale in (src_path + '-wal', src_path + '-shm', src_path + '-journal'):
              if os.path.exists(stale):
                  os.remove(stale)
          shutil.move(dst_path, src_path)
          print(f'✅ Replaced {src_path} with clean snapshot')
          " 2>&1 | tee -a "$SNAPSHOT_LOG"
          FLUSH_RC=${PIPESTATUS[0]}
          set -e

          log "=== Snapshot exit code: $FLUSH_RC ==="
          log "--- Final data/geohazard.db* listing ---"
          ls -la data/geohazard.db* 2>&1 | tee -a "$SNAPSHOT_LOG" || true

          if [ $FLUSH_RC -eq 0 ]; then
            echo "flush_ok=true" >> "$GITHUB_OUTPUT"
            echo "flush_reason=ok" >> "$GITHUB_OUTPUT"
            log "✅ Snapshot step SUCCESS"
          else
            echo "flush_ok=false" >> "$GITHUB_OUTPUT"
            case $FLUSH_RC in
              2) REASON="integrity-check-failed" ;;
              3) REASON="size-mismatch" ;;
              4) REASON="too-few-tables" ;;
              5) REASON="row-count-loss" ;;
              *) REASON="unknown-rc-$FLUSH_RC" ;;
            esac
            echo "flush_reason=$REASON" >> "$GITHUB_OUTPUT"
            log "::error::Snapshot step FAILED (rc=$FLUSH_RC, reason=$REASON) — DB will NOT be uploaded"
          fi

          # Discord notification — fires on both success and failure.
          # Uses a quoted heredoc so bash does NOT interpolate anything
          # into the python source. All params come via environment vars
          # so special characters in log tails can't break the syntax.
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            if [ $FLUSH_RC -eq 0 ]; then
              export SNAPSHOT_TITLE="💾 DB Snapshot OK"
              export SNAPSHOT_COLOR=3066993
              export SNAPSHOT_DESC="Clean backup written to data/geohazard.db — uploading checkpoint next."
              export SNAPSHOT_REASON="ok"
            else
              export SNAPSHOT_TITLE="🛑 DB Snapshot FAILED"
              export SNAPSHOT_COLOR=15158332
              export SNAPSHOT_DESC="Snapshot step failed (rc=$FLUSH_RC). Checkpoint upload skipped — analyze job will have no DB."
              export SNAPSHOT_REASON="$REASON"
            fi
            export SNAPSHOT_LOG_PATH="$SNAPSHOT_LOG"
            export RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            python3 <<'PYEOF' || true
          import json, os, urllib.request, pathlib

          url = os.environ['DISCORD_WEBHOOK_URL']
          title = os.environ['SNAPSHOT_TITLE']
          color = int(os.environ['SNAPSHOT_COLOR'])
          desc = os.environ['SNAPSHOT_DESC']
          reason = os.environ['SNAPSHOT_REASON']
          run_url = os.environ['RUN_URL']
          log_path = os.environ['SNAPSHOT_LOG_PATH']

          # Last 40 lines of the snapshot log for context
          try:
              lines = pathlib.Path(log_path).read_text().splitlines()
              tail = '\n'.join(lines[-40:])
          except Exception as e:
              tail = f'(could not read log: {e})'
          tail_block = f'```\n{tail}\n```'
          # Discord field value max is 1024 chars
          if len(tail_block) > 1024:
              tail_block = tail_block[:1015] + '\n```'

          payload = {
              'embeds': [{
                  'title': title,
                  'description': desc,
                  'color': color,
                  'fields': [
                      {'name': 'Reason', 'value': reason, 'inline': True},
                      {'name': 'Run', 'value': f'[Actions]({run_url})', 'inline': True},
                      {'name': 'Tail of snapshot.log', 'value': tail_block, 'inline': False},
                  ],
                  'footer': {'text': 'DB Snapshot'},
              }]
          }
          body = json.dumps(payload).encode()
          req = urllib.request.Request(
              url,
              data=body,
              headers={
                  'Content-Type': 'application/json',
                  'User-Agent': 'geohazard-snapshot/1.0',
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f'Discord HTTP {r.status}')
          except Exception as e:
              print(f'Discord notify error: {e}')
          PYEOF
          fi

          # Exit 0 so if: always() on the upload step can still evaluate
          # flush_ok correctly — the upload will be skipped by its own guard.
          exit 0

      - name: Upload database checkpoint (post-fetch)
        if: always() && steps.wal_flush.outputs.flush_ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: database-checkpoint-${{ github.run_id }}
          path: |
            data/geohazard.db
            results/data_validation.json
            results/data_gaps.json
          retention-days: 90

      # Uploaded after the snapshot step so results/midrun/snapshot.log
      # (written by the snapshot step above) is included in the artifact.
      - name: Upload midrun report (fetch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midrun-fetch-${{ github.run_id }}
          path: results/midrun/
          retention-days: 7

  # ====== JOB 2: ANALYZE ======
  # Restores DB from fetch job, runs all analysis + ML.
  # Separate 6-hour budget ensures ML always has time to complete.
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 330  # Must be < GitHub's 360min hard limit so if: always() steps can save results
    needs: fetch
    if: always() && needs.fetch.result != 'cancelled'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite scikit-learn scipy numpy netCDF4

      - name: Restore database from fetch job
        uses: actions/download-artifact@v4
        with:
          name: database-checkpoint-${{ github.run_id }}
          path: .

      # Needed by the final Discord notification step to read
      # results/midrun/snapshot.log and surface snapshot step status.
      - name: Restore midrun report from fetch job
        uses: actions/download-artifact@v4
        with:
          name: midrun-fetch-${{ github.run_id }}
          path: results/midrun/
        continue-on-error: true

      - name: Verify restored database
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          if [ ! -f data/geohazard.db ]; then
            echo "::error::Database not found after restore"
            exit 1
          fi
          # Remove stale WAL/SHM files
          rm -f data/geohazard.db-wal data/geohazard.db-shm
          DB_SIZE=$(du -h data/geohazard.db | cut -f1)
          DB_BYTES=$(stat -c%s data/geohazard.db)
          echo "Database restored ($DB_SIZE, $DB_BYTES bytes) — running full verification..."
          # Minimum viable DB check (detect truncated artifact downloads)
          if [ "$DB_BYTES" -lt 65536 ]; then
            echo "::error::DB file suspiciously small ($DB_BYTES bytes) — likely corrupted during artifact download"
            exit 1
          fi
          python3 -c "
          import sqlite3, sys, os

          db_path = 'data/geohazard.db'
          conn = sqlite3.connect(db_path)

          # File size vs page count check (detect truncation at page boundary)
          page_size = conn.execute('PRAGMA page_size').fetchone()[0]
          page_count = conn.execute('PRAGMA page_count').fetchone()[0]
          expected = page_size * page_count
          actual = os.path.getsize(db_path)
          if actual != expected:
              print(f'::error::DB size mismatch: file={actual}, expected={expected} ({page_size}x{page_count})')
              conn.close()
              sys.exit(1)
          print(f'File size OK: {actual:,} bytes = {page_count} pages x {page_size} bytes')

          # Full integrity check
          result = conn.execute('PRAGMA integrity_check').fetchone()[0]
          if result != 'ok':
              print(f'::error::DB integrity check FAILED: {result}')
              conn.close()
              sys.exit(1)

          # Table inventory
          tables = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()
          total = 0
          for t in tables:
              count = conn.execute(f'SELECT COUNT(*) FROM {t[0]}').fetchone()[0]
              total += count
              print(f'  {t[0]}: {count:,} rows')
          print(f'Total: {total:,} rows across {len(tables)} tables')
          conn.close()
          print('DB verification passed')
          "

      # ====== ANALYSIS PHASE ======

      - name: Run Coulomb stress analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/coulomb_analysis.py --min-mag 5.0

      - name: Run ETAS analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/etas_analysis.py --min-mag 5.0

      - name: Run cluster analysis (Zaliapin-Ben-Zion)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cluster_analysis.py --min-mag 5.0

      - name: Run Phase 2 validation (isolation + delay + correlation + prospective)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/validate_phase2.py

      - name: Run LURR analysis (tidal stress response)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/lurr_analysis.py

      - name: Run Natural Time analysis (criticality detection)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/natural_time_analysis.py

      - name: Run Earthquake Nowcasting
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/nowcast_analysis.py

      - name: Run ULF magnetic anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ulf_analysis.py || echo "ULF analysis skipped (insufficient data)"

      - name: Run cosmic ray anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cosmic_ray_analysis.py || echo "Cosmic ray analysis skipped (insufficient data)"

      - name: Run MODIS LST thermal anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/modis_lst_analysis.py

      - name: Run GNSS-TEC high-resolution analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/gnss_tec_analysis.py || echo "GNSS-TEC analysis skipped (insufficient data)"

      - name: Run Pattern Informatics analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/pattern_informatics.py

      - name: Run ML integrated prediction
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ml_prediction.py || echo "ML prediction failed (non-fatal)"

      # ====== CRITICAL RESULTS CHECKPOINT ======

      - name: Notify Discord — ML complete
        if: always()
        run: |
          mkdir -p results/midrun
          # Extract AUC from latest ML result
          AUC=$(python3 -c "
          import json, glob
          files = sorted(glob.glob('results/ml_prediction_*.json'))
          if not files:
              print('No ML results')
          else:
              d = json.loads(open(files[-1]).read())
              cv = d.get('cv_auc_pooled', '?')
              test = d.get('test_auc', {}).get('rf', '?')
              features = d.get('n_features_active', '?')
              print(f'CV={cv} Test={test} feat={features}')
          " 2>/dev/null || echo "AUC: unavailable")
          # Save to log file for artifact retrieval
          echo "=== ML Phase Complete ===" > results/midrun/ml_report.txt
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> results/midrun/ml_report.txt
          echo "Results: $AUC" >> results/midrun/ml_report.txt
          echo "::notice::ML phase: $AUC"
          # Discord notification
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -w "\nHTTP %{http_code}\n" -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"🧠 ML Phase Complete\",
                  \"color\": 10181046,
                  \"fields\": [
                    {\"name\": \"Results\", \"value\": \"$AUC\", \"inline\": true},
                    {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                  ],
                  \"footer\": {\"text\": \"Stacking + prospective analysis next\"}
                }]
              }"
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

      - name: Upload midrun report (ML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midrun-ml-${{ github.run_id }}
          path: results/midrun/
          retention-days: 7

      - name: Upload ML results checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-results-${{ github.run_id }}
          path: |
            results/feature_matrix.json
            results/ml_prediction_*.json
          retention-days: 90
          if-no-files-found: warn

      - name: Load feature matrix to BigQuery
        if: always()
        continue-on-error: true
        timeout-minutes: 15
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PHASE: "${{ github.sha }}"
          RESULTS_DIR: ./results
        run: |
          pip install google-cloud-bigquery pandas db-dtypes pyarrow 2>/dev/null
          if [ -f results/feature_matrix.json ]; then
            python3 scripts/load_to_bq.py
          else
            echo "No feature_matrix.json — skipping BQ load"
          fi

      - name: Run prospective prediction analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/prospective_analysis.py

      - name: Export CSEP forecast and run benchmark
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install pycsep 2>/dev/null || true
          python3 scripts/export_csep.py || echo "CSEP export failed (non-fatal)"
          python3 scripts/csep_benchmark.py || echo "CSEP benchmark failed (non-fatal)"

      - name: Run ensemble stacking analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/stacking_analysis.py || echo "Stacking analysis failed (non-fatal)"

      - name: Run analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/run_analysis.py \
            --min-mag ${{ github.event.inputs.min_mag || '5.0' }} \
            --type ${{ github.event.inputs.analysis_type || 'all' }}

      - name: Final data validation
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/validate_data.py
          echo ""
          echo "=== Database file size ==="
          ls -lh data/geohazard.db 2>/dev/null || echo "DB file not found!"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Upload final database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-final-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 90

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FETCH_RESULT: ${{ needs.fetch.result }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          # Rich final notification — includes data validation summary, problem
          # tables, low-coverage tables, and links. Uses a quoted heredoc so
          # nothing is bash-interpolated into the python source; everything
          # comes via environment variables or file reads.
          python3 <<'PYEOF' || true
          import json, os, pathlib, urllib.request

          webhook = os.environ['DISCORD_WEBHOOK_URL']
          job_status = os.environ.get('JOB_STATUS', 'unknown')
          fetch_result = os.environ.get('FETCH_RESULT', 'unknown')
          run_url = os.environ['RUN_URL']

          if job_status == 'success':
              title = '🌍 Geohazard Analysis Complete'
              color = 3066993
          else:
              title = '❌ Geohazard Analysis Failed'
              color = 15158332

          # Parse data_validation.json (written by validate_data.py in fetch
          # job and restored via the DB artifact in analyze job).
          validation_path = pathlib.Path('results/data_validation.json')
          summary_line = '(data_validation.json not found)'
          problem_lines: list[str] = []
          low_cov_lines: list[str] = []
          total_rows = 0
          if validation_path.exists():
              try:
                  d = json.loads(validation_path.read_text())
                  ok = d.get('ok', 0)
                  low = d.get('low', 0)
                  empty = d.get('empty', 0)
                  missing = d.get('missing', 0)
                  total_tables = d.get('total_tables', '?')
                  summary_line = f'{ok} OK / {low} LOW / {empty} EMPTY / {missing} MISSING (of {total_tables})'
                  tables = d.get('tables', {})
                  for name, info in sorted(tables.items()):
                      status = info.get('status', '?')
                      rows = info.get('rows', 0)
                      cov = info.get('coverage_pct')
                      if isinstance(rows, int):
                          total_rows += rows
                      if status in ('EMPTY', 'MISSING'):
                          problem_lines.append(f'{status:7s} {name}')
                      elif status == 'LOW':
                          cov_str = f' cov={cov}%' if cov is not None else ''
                          problem_lines.append(f'{status:7s} {name} ({rows:,} rows{cov_str})')
                      if status == 'OK' and isinstance(cov, (int, float)) and cov < 70:
                          low_cov_lines.append(f'{name}: {rows:,} rows, cov={cov}%')
              except Exception as e:
                  summary_line = f'(failed to parse validation: {e})'

          # Parse snapshot reason from midrun log (if present)
          snapshot_log = pathlib.Path('results/midrun/snapshot.log')
          snapshot_line = ''
          if snapshot_log.exists():
              for line in snapshot_log.read_text().splitlines():
                  if 'Snapshot step SUCCESS' in line or 'Snapshot step FAILED' in line:
                      snapshot_line = line.strip()
                      break
          if not snapshot_line:
              snapshot_line = '(no snapshot.log found)'

          def fit(block: str, limit: int = 1024) -> str:
              if len(block) <= limit:
                  return block
              return block[: limit - 4] + '\n...'

          problems_block = '\n'.join(problem_lines) if problem_lines else 'none'
          low_cov_block = '\n'.join(low_cov_lines) if low_cov_lines else 'none'

          fields = [
              {'name': 'Job status', 'value': job_status, 'inline': True},
              {'name': 'Fetch result', 'value': fetch_result, 'inline': True},
              {'name': 'Total rows', 'value': f'{total_rows:,}', 'inline': True},
              {'name': 'Data validation', 'value': summary_line, 'inline': False},
              {'name': 'Problem tables', 'value': fit(f'```\n{problems_block}\n```'), 'inline': False},
              {'name': 'Low coverage (<70%)', 'value': fit(f'```\n{low_cov_block}\n```'), 'inline': False},
              {'name': 'Snapshot step', 'value': fit(snapshot_line, 1024), 'inline': False},
              {'name': 'Run', 'value': f'[Actions]({run_url})', 'inline': False},
          ]

          payload = {
              'embeds': [{
                  'title': title,
                  'color': color,
                  'fields': fields,
                  'footer': {'text': 'Earthquake Correlation Analysis'},
              }]
          }
          body = json.dumps(payload).encode()
          req = urllib.request.Request(
              webhook,
              data=body,
              headers={
                  'Content-Type': 'application/json',
                  'User-Agent': 'geohazard-final-notify/1.0',
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  print(f'Discord HTTP {r.status}')
          except Exception as e:
              print(f'Discord notify error: {e}')
          PYEOF
        continue-on-error: true
