name: Earthquake Correlation Analysis

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3:00 UTC (12:00 JST)
  workflow_dispatch:
    inputs:
      memo:
        description: 'What are you running and why?'
        required: true
      min_mag:
        description: 'Minimum magnitude for target earthquakes'
        required: false
        default: '5.0'
      analysis_type:
        description: 'Analysis type: all | bvalue | tec | lag | multi | advanced'
        required: false
        default: 'all'

jobs:
  # ====== JOB 1: FETCH ======
  # Data collection + validation + gap diagnosis.
  # Runs independently with its own 6-hour budget.
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite scikit-learn scipy numpy netCDF4
          sudo apt-get install -y ncompress  # For .Z IONEX decompression

      # ====== RESTORE PREVIOUS DB CHECKPOINT ======
      # Incremental fetch: restore previous run's DB so skip-logic kicks in
      # (e.g., fetch_poes_particles.py skips years with >300 records)
      - name: Restore previous database checkpoint
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p data
          PREV_RUN=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name | startswith("database-checkpoint-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty' 2>/dev/null)
          if [ -n "$PREV_RUN" ] && [ "$PREV_RUN" != "${{ github.run_id }}" ]; then
            echo "Downloading DB checkpoint from run $PREV_RUN..."
            gh run download "$PREV_RUN" --repo ${{ github.repository }} \
              --name "database-checkpoint-$PREV_RUN" \
              --dir /tmp/db-restore 2>/dev/null || true
            if [ -f /tmp/db-restore/data/geohazard.db ]; then
              cp /tmp/db-restore/data/geohazard.db data/geohazard.db
              # Remove stale WAL/SHM files that cause "malformed" errors
              rm -f data/geohazard.db-wal data/geohazard.db-shm
              DB_SIZE=$(du -h data/geohazard.db | cut -f1)
              echo "Restored DB from run $PREV_RUN ($DB_SIZE) — running integrity check..."
              python3 -c "
          import sqlite3, sys
          conn = sqlite3.connect('data/geohazard.db')
          result = conn.execute('PRAGMA integrity_check').fetchone()[0]
          if result != 'ok':
              print(f'❌ DB integrity check FAILED: {result}')
              conn.close()
              sys.exit(1)
          tables = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()
          for t in tables:
              count = conn.execute(f'SELECT COUNT(*) FROM {t[0]}').fetchone()[0]
              print(f'  {t[0]}: {count:,} rows')
          conn.close()
          print('✅ DB integrity check passed')
          "
              if [ $? -ne 0 ]; then
                echo "⚠️ Corrupted checkpoint — deleting and starting fresh"
                rm -f data/geohazard.db
              fi
            else
              echo "⚠️ No DB file in checkpoint artifact"
            fi
          else
            echo "No previous checkpoint found — starting fresh"
          fi

      - name: Validate Earthdata credentials
        id: earthdata_check
        env:
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          if python3 scripts/test_earthdata_auth.py; then
            echo "earthdata_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "earthdata_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Earthdata auth FAILED — cloud_fraction, SO2, nightlight, ISS LIS will be SKIPPED"
            echo "### ⚠️ Earthdata Auth Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "cloud_fraction, SO2, nightlight, ISS LIS sources will be skipped this run." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
        continue-on-error: true

      - name: Fetch earthquake data (M3+, 2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data
          python3 scripts/fetch_earthquakes.py

      - name: Fetch TEC data (major events ±7 days)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode event

      - name: Fetch TEC random baseline (±7 days around 300 random dates)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode random --n-dates 300

      - name: Fetch Kp data (2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kp.py

      - name: Fetch CMT focal mechanisms (GCMT, 2011-present)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cmt.py

      - name: Fetch GNSS-TEC high-resolution data (Nagoya University ISEE)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4 2>/dev/null || pip install scipy 2>/dev/null || true
          python3 scripts/fetch_gnss_tec.py || echo "GNSS-TEC fetch non-fatal failure"

      - name: Fetch MODIS LST (thermal anomaly discovery)
        continue-on-error: true
        timeout-minutes: 90
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_modis_lst.py || echo "MODIS LST discovery completed (may need Earthdata auth for full download)"

      - name: Fetch Kakioka ULF magnetic data
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kakioka_ulf.py || echo "ULF fetch completed (may need WDC registration for full access)"

      # --- Phase 9: Non-traditional precursor data sources ---

      - name: Fetch NMDB cosmic ray data (Homola et al. 2023)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_nmdb_cosmicray.py || echo "NMDB fetch failed (non-fatal)"

      - name: Fetch Blitzortung lightning data
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_blitzortung.py || echo "Lightning fetch failed (non-fatal)"

      - name: Fetch ISS LIS lightning data (Earthdata auth, 2017-2023)
        continue-on-error: true
        timeout-minutes: 20
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install netCDF4 2>/dev/null || true
          python3 scripts/fetch_iss_lis_lightning.py || echo "ISS LIS fetch failed (non-fatal)"

      - name: Fetch INTERMAGNET hourly + CSES satellite EM data
        continue-on-error: true
        timeout-minutes: 60
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cses_satellite.py || echo "Satellite EM fetch failed (non-fatal)"

      - name: Fetch Movebank animal tracking data
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          MOVEBANK_USER: ${{ secrets.MOVEBANK_USER }}
          MOVEBANK_PASS: ${{ secrets.MOVEBANK_PASS }}
        run: |
          python3 scripts/fetch_movebank.py || echo "Movebank fetch failed (non-fatal)"

      # --- Phase 10: Unconventional data sources ---

      - name: Fetch NOAA OLR daily (thermal anomaly, no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4
          python3 scripts/fetch_olr.py || echo "OLR fetch failed (non-fatal)"

      - name: Fetch IERS Earth Orientation Parameters (no auth)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_iers_eop.py || echo "IERS EOP fetch failed (non-fatal)"

      - name: Fetch NASA OMNIWeb solar wind hourly (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_solar_wind.py || echo "Solar wind fetch failed (non-fatal)"

      - name: Fetch GRACE/GRACE-FO gravity anomaly (Earthdata auth optional)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_grace_gravity.py || echo "GRACE fetch failed (non-fatal)"

      - name: Fetch OMI SO2 column data (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 60
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_omi_so2.py || echo "SO2 fetch failed (non-fatal)"

      - name: Fetch SMAP soil moisture (Earthdata auth optional)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_smap_moisture.py || echo "SMAP fetch failed (non-fatal)"

      # --- Phase 10b: Additional unconventional sources ---

      - name: Fetch UHSLC tide gauge data (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tide_gauge.py || echo "Tide gauge fetch failed (non-fatal)"

      - name: Fetch NASA ocean color chlorophyll-a (Earthdata auth optional)
        continue-on-error: true
        timeout-minutes: 40
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_ocean_color.py || echo "Ocean color fetch failed (non-fatal)"

      - name: Fetch MODIS cloud fraction (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 60
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_cloud_fraction.py || echo "Cloud fraction fetch failed (non-fatal)"

      - name: Fetch VIIRS nighttime light/airglow (Earthdata auth)
        continue-on-error: true
        timeout-minutes: 20
        if: steps.earthdata_check.outputs.earthdata_ok == 'true'
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install h5py 2>/dev/null || true
          python3 scripts/fetch_viirs_nighttime.py || echo "VIIRS fetch failed (non-fatal)"

      # InSAR disabled: LiCSAR has Japan frame definitions but no processed
      # interferograms (verified 2026-03-20). Re-enable when data becomes available.
      # - name: Fetch InSAR deformation (COMET LiCSAR)
      #   env:
      #     GEOHAZARD_DB_PATH: ./data/geohazard.db
      #   run: |
      #     pip install rasterio 2>/dev/null || true
      #     python3 scripts/fetch_insar.py || echo "InSAR fetch failed (non-fatal)"

      # --- Phase 11: Space/cosmic data sources ---

      - name: Fetch GOES X-ray flux (solar flares, no auth)
        continue-on-error: true
        timeout-minutes: 20
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_xray.py || echo "GOES X-ray fetch failed (non-fatal)"

      - name: Fetch GOES proton flux (SEP events, no auth)
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_proton.py || echo "GOES proton fetch failed (non-fatal)"

      - name: Compute tidal stress (lunar+solar, pure calculation)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tidal_stress.py || echo "Tidal stress computation failed (non-fatal)"

      - name: Fetch GOES electron flux (particle precipitation, no auth)
        continue-on-error: true
        timeout-minutes: 30
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_poes_particles.py || echo "Particle flux fetch failed (non-fatal)"

      - name: Fetch NOAA DART ocean bottom pressure (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_dart_pressure.py || echo "DART pressure fetch failed (non-fatal)"

      - name: Fetch IOC sea level monitoring (no auth)
        continue-on-error: true
        timeout-minutes: 15
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_ioc_sealevel.py || echo "IOC sea level fetch failed (non-fatal)"

      - name: Install win32tools for S-net (catwin32 + win2sac_32)
        continue-on-error: true
        timeout-minutes: 5
        env:
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          if [ -z "$HINET_USER" ] || [ -z "$HINET_PASS" ]; then
            echo "HINET credentials not set, skipping win32tools"
            exit 0
          fi
          pip install HinetPy 2>/dev/null || true
          python3 -c "from HinetPy import Client; Client('${HINET_USER}', '${HINET_PASS}')._get_win32tools()" || exit 0
          if [ -f win32tools.tar.gz ]; then
            tar -xf win32tools.tar.gz && rm win32tools.tar.gz
            cd win32tools && make && mkdir -p bin && mv catwin32.src/catwin32 win2sac.src/win2sac_32 bin/ && cd ..
            echo "${{ github.workspace }}/win32tools/bin" >> $GITHUB_PATH
          fi

      - name: Fetch S-net multi-sensor waveform features (Phase 19)
        continue-on-error: true
        timeout-minutes: 150
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          pip install HinetPy 2>/dev/null || true
          python3 scripts/fetch_snet_waveform.py || echo "S-net waveform fetch failed (non-fatal)"
          # Copy coverage report to results for artifact
          if [ -f results/snet_coverage.json ]; then
            mkdir -p results/midrun
            cp results/snet_coverage.json results/midrun/
          fi

      # ====== DATA PRESERVATION CHECKPOINT ======
      # All fetch steps complete. Validate + diagnose + save DB.

      - name: Download previous validation report
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find most recent successful artifact with validation data
          PREV_RUN=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name | startswith("database-checkpoint-")) | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty' 2>/dev/null)
          if [ -n "$PREV_RUN" ] && [ "$PREV_RUN" != "${{ github.run_id }}" ]; then
            gh run download "$PREV_RUN" --repo ${{ github.repository }} \
              --name "database-checkpoint-$PREV_RUN" \
              --dir /tmp/prev-checkpoint 2>/dev/null || true
            if [ -f /tmp/prev-checkpoint/results/data_validation.json ]; then
              cp /tmp/prev-checkpoint/results/data_validation.json /tmp/prev_validation.json
              echo "Previous validation report found (run $PREV_RUN)"
            fi
          fi

      - name: Validate data completeness
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          PREV_FLAG=""
          if [ -f /tmp/prev_validation.json ]; then
            PREV_FLAG="--previous /tmp/prev_validation.json"
          fi
          python3 scripts/validate_data.py $PREV_FLAG

      - name: Diagnose data gaps
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/diagnose_data_gaps.py --db ./data/geohazard.db --json --ci

      - name: Notify Discord — fetch phase complete
        if: always()
        run: |
          mkdir -p results/midrun
          # Extract full validation report
          python3 -c "
          import json, pathlib
          p = pathlib.Path('results/data_validation.json')
          if not p.exists():
              open('results/midrun/fetch_report.txt', 'w').write('Validation not available\n')
              exit()
          d = json.loads(p.read_text())
          ok = d.get('ok', 0)
          low = d.get('low', 0)
          empty = d.get('empty', 0)
          missing = d.get('missing', 0)
          total = d.get('total_tables', '?')
          status = d.get('status', '?')
          summary = f'{ok} OK / {low} LOW / {empty} EMPTY / {missing} MISSING (of {total})'
          # Categorize problem tables with coverage info
          tables = d.get('tables', {})
          problems = []
          low_coverage = []
          for name, info in sorted(tables.items()):
              s = info.get('status', 'UNKNOWN')
              rows = info.get('rows', 0)
              cov = info.get('coverage_pct')
              if s in ('EMPTY', 'MISSING'):
                  problems.append(f'{name}: {s}')
              elif s == 'LOW':
                  cov_str = f', coverage {cov}%' if cov is not None else ''
                  problems.append(f'{name}: LOW ({rows} rows{cov_str})')
              # Flag OK tables with low coverage (data gaps)
              if s == 'OK' and cov is not None and cov < 70:
                  low_coverage.append(f'{name}: {rows:,} rows, coverage {cov}%')
          # Build report file
          lines = [
              f'=== Fetch Phase Complete ===',
              f'Status: {status}',
              f'Summary: {summary}',
              '',
          ]
          if problems:
              lines.append('Problem tables (EMPTY/MISSING/LOW):')
              lines.extend(f'  - {p}' for p in problems)
          else:
              lines.append('No EMPTY/MISSING/LOW tables')
          if low_coverage:
              lines.append('')
              lines.append('Low coverage (<70%) — data gaps:')
              lines.extend(f'  - {lc}' for lc in low_coverage)
          lines.append('')
          # All tables summary
          lines.append('All tables:')
          for name, info in sorted(tables.items()):
              rows = info.get('rows', 0)
              s = info.get('status', '?')
              cov = info.get('coverage_pct')
              cov_str = f' cov={cov}%' if cov is not None else ''
              lines.append(f'  {s:7s} {name}: {rows:,} rows{cov_str}')
          report = '\n'.join(lines)
          pathlib.Path('results/midrun/fetch_report.txt').write_text(report + '\n')
          # Discord-friendly strings
          pathlib.Path('/tmp/notify_summary.txt').write_text(summary)
          # Combine problems + low coverage for Discord
          all_issues = problems[:]
          if low_coverage:
              all_issues.append('--- Low coverage ---')
              all_issues.extend(low_coverage)
          issue_str = '\n'.join(all_issues[:15]) if all_issues else 'All healthy'
          pathlib.Path('/tmp/notify_problems.txt').write_text(issue_str)
          "
          # Copy reports for artifact
          if [ -f results/data_validation.json ]; then
            cp results/data_validation.json results/midrun/
          fi
          if [ -f results/data_gaps.json ]; then
            cp results/data_gaps.json results/midrun/
          fi
          SUMMARY=$(cat /tmp/notify_summary.txt 2>/dev/null || echo "Stats unavailable")
          PROBLEMS=$(cat /tmp/notify_problems.txt 2>/dev/null || echo "Unknown")
          echo "::notice::Fetch phase: $SUMMARY"
          # Discord notification
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"📡 Fetch Phase Complete\",
                  \"color\": 3447003,
                  \"fields\": [
                    {\"name\": \"Summary\", \"value\": \"$SUMMARY\", \"inline\": false},
                    {\"name\": \"Problems\", \"value\": \"$PROBLEMS\", \"inline\": false},
                    {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                  ],
                  \"footer\": {\"text\": \"Analyze job starting next\"}
                }]
              }"
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        continue-on-error: true

      - name: Upload midrun report (fetch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midrun-fetch-${{ github.run_id }}
          path: results/midrun/
          retention-days: 7

      - name: Flush WAL before checkpoint upload
        if: always()
        run: |
          if [ -f data/geohazard.db ]; then
            python3 -c "
          import sqlite3
          conn = sqlite3.connect('data/geohazard.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
          conn.close()
          print('✅ WAL flushed — safe to upload')
          " || echo "⚠️ WAL flush failed (DB may be corrupted)"
          fi

      - name: Upload database checkpoint (post-fetch)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-checkpoint-${{ github.run_id }}
          path: |
            data/geohazard.db
            results/data_validation.json
            results/data_gaps.json
          retention-days: 90

  # ====== JOB 2: ANALYZE ======
  # Restores DB from fetch job, runs all analysis + ML.
  # Separate 6-hour budget ensures ML always has time to complete.
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    needs: fetch
    if: always() && needs.fetch.result != 'cancelled'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite scikit-learn scipy numpy netCDF4

      - name: Restore database from fetch job
        uses: actions/download-artifact@v4
        with:
          name: database-checkpoint-${{ github.run_id }}
          path: .

      - name: Verify restored database
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          if [ ! -f data/geohazard.db ]; then
            echo "::error::Database not found after restore"
            exit 1
          fi
          # Remove stale WAL/SHM files
          rm -f data/geohazard.db-wal data/geohazard.db-shm
          DB_SIZE=$(du -h data/geohazard.db | cut -f1)
          echo "Database restored ($DB_SIZE) — running integrity check..."
          python3 -c "
          import sqlite3, sys
          conn = sqlite3.connect('data/geohazard.db')
          result = conn.execute('PRAGMA integrity_check').fetchone()[0]
          if result != 'ok':
              print(f'::error::DB integrity check FAILED: {result}')
              conn.close()
              sys.exit(1)
          tables = conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()
          total = 0
          for t in tables:
              count = conn.execute(f'SELECT COUNT(*) FROM {t[0]}').fetchone()[0]
              total += count
              print(f'  {t[0]}: {count:,} rows')
          print(f'Total: {total:,} rows across {len(tables)} tables')
          conn.close()
          print('✅ DB integrity check passed')
          "

      # ====== ANALYSIS PHASE ======

      - name: Run Coulomb stress analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/coulomb_analysis.py --min-mag 5.0

      - name: Run ETAS analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/etas_analysis.py --min-mag 5.0

      - name: Run cluster analysis (Zaliapin-Ben-Zion)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cluster_analysis.py --min-mag 5.0

      - name: Run Phase 2 validation (isolation + delay + correlation + prospective)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/validate_phase2.py

      - name: Run LURR analysis (tidal stress response)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/lurr_analysis.py

      - name: Run Natural Time analysis (criticality detection)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/natural_time_analysis.py

      - name: Run Earthquake Nowcasting
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/nowcast_analysis.py

      - name: Run ULF magnetic anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ulf_analysis.py || echo "ULF analysis skipped (insufficient data)"

      - name: Run cosmic ray anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cosmic_ray_analysis.py || echo "Cosmic ray analysis skipped (insufficient data)"

      - name: Run MODIS LST thermal anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/modis_lst_analysis.py

      - name: Run GNSS-TEC high-resolution analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/gnss_tec_analysis.py || echo "GNSS-TEC analysis skipped (insufficient data)"

      - name: Run Pattern Informatics analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/pattern_informatics.py

      - name: Run ML integrated prediction
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ml_prediction.py || echo "ML prediction failed (non-fatal)"

      # ====== CRITICAL RESULTS CHECKPOINT ======

      - name: Notify Discord — ML complete
        if: always()
        run: |
          mkdir -p results/midrun
          # Extract AUC from latest ML result
          AUC=$(python3 -c "
          import json, glob
          files = sorted(glob.glob('results/ml_prediction_*.json'))
          if not files:
              print('No ML results')
          else:
              d = json.loads(open(files[-1]).read())
              cv = d.get('cv_auc_pooled', '?')
              test = d.get('test_auc', {}).get('rf', '?')
              features = d.get('n_features_active', '?')
              print(f'CV={cv} Test={test} feat={features}')
          " 2>/dev/null || echo "AUC: unavailable")
          # Save to log file for artifact retrieval
          echo "=== ML Phase Complete ===" > results/midrun/ml_report.txt
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> results/midrun/ml_report.txt
          echo "Results: $AUC" >> results/midrun/ml_report.txt
          echo "::notice::ML phase: $AUC"
          # Discord notification
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"🧠 ML Phase Complete\",
                  \"color\": 10181046,
                  \"fields\": [
                    {\"name\": \"Results\", \"value\": \"$AUC\", \"inline\": true},
                    {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                  ],
                  \"footer\": {\"text\": \"Stacking + prospective analysis next\"}
                }]
              }"
          fi
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true

      - name: Upload midrun report (ML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: midrun-ml-${{ github.run_id }}
          path: results/midrun/
          retention-days: 7

      - name: Upload ML results checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-results-${{ github.run_id }}
          path: |
            results/feature_matrix.json
            results/ml_prediction_*.json
          retention-days: 90
          if-no-files-found: warn

      - name: Load feature matrix to BigQuery
        if: always()
        continue-on-error: true
        timeout-minutes: 15
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PHASE: "${{ github.sha }}"
          RESULTS_DIR: ./results
        run: |
          pip install google-cloud-bigquery pandas db-dtypes pyarrow 2>/dev/null
          if [ -f results/feature_matrix.json ]; then
            python3 scripts/load_to_bq.py
          else
            echo "No feature_matrix.json — skipping BQ load"
          fi

      - name: Run prospective prediction analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/prospective_analysis.py

      - name: Export CSEP forecast and run benchmark
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install pycsep 2>/dev/null || true
          python3 scripts/export_csep.py || echo "CSEP export failed (non-fatal)"
          python3 scripts/csep_benchmark.py || echo "CSEP benchmark failed (non-fatal)"

      - name: Run ensemble stacking analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/stacking_analysis.py || echo "Stacking analysis failed (non-fatal)"

      - name: Run analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/run_analysis.py \
            --min-mag ${{ github.event.inputs.min_mag || '5.0' }} \
            --type ${{ github.event.inputs.analysis_type || 'all' }}

      - name: Final data validation
        if: always()
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/validate_data.py
          echo ""
          echo "=== Database file size ==="
          ls -lh data/geohazard.db 2>/dev/null || echo "DB file not found!"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results-${{ github.run_id }}
          path: results/
          retention-days: 90

      - name: Upload final database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-final-${{ github.run_id }}
          path: data/geohazard.db
          retention-days: 90

      - name: Notify Discord
        if: always()
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="🌍 Geohazard Analysis Complete"
            COLOR=3066993
          else
            TITLE="❌ Geohazard Analysis Failed"
            COLOR=15158332
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {\"name\": \"Status\", \"value\": \"$STATUS\", \"inline\": true},
                  {\"name\": \"Log\", \"value\": \"[Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"Earthquake Correlation Analysis\"}
              }]
            }"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        continue-on-error: true
