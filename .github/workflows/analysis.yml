name: Earthquake Correlation Analysis

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday 3:00 UTC (12:00 JST)
  workflow_dispatch:
    inputs:
      memo:
        description: 'What are you running and why?'
        required: true
      min_mag:
        description: 'Minimum magnitude for target earthquakes'
        required: false
        default: '5.0'
      analysis_type:
        description: 'Analysis type: all | bvalue | tec | lag | multi | advanced'
        required: false
        default: 'all'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install aiohttp aiosqlite scikit-learn scipy
          sudo apt-get install -y ncompress  # For .Z IONEX decompression

      - name: Fetch earthquake data (M3+, 2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          mkdir -p data
          python3 scripts/fetch_earthquakes.py

      - name: Fetch TEC data (major events ±7 days)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode event

      - name: Fetch TEC random baseline (±7 days around 300 random dates)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tec.py --mode random --n-dates 300

      - name: Fetch Kp data (2011-2026)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kp.py

      - name: Fetch CMT focal mechanisms (GCMT, 2011-present)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cmt.py

      - name: Run Coulomb stress analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/coulomb_analysis.py --min-mag 5.0

      - name: Run ETAS analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/etas_analysis.py --min-mag 5.0

      - name: Run cluster analysis (Zaliapin-Ben-Zion)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cluster_analysis.py --min-mag 5.0

      - name: Fetch GNSS-TEC high-resolution data (Nagoya University ISEE)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4 2>/dev/null || pip install scipy 2>/dev/null || true
          python3 scripts/fetch_gnss_tec.py || echo "GNSS-TEC fetch non-fatal failure"

      - name: Run Phase 2 validation (isolation + delay + correlation + prospective)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/validate_phase2.py

      - name: Run LURR analysis (tidal stress response)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/lurr_analysis.py

      - name: Run Natural Time analysis (criticality detection)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/natural_time_analysis.py

      - name: Run Earthquake Nowcasting
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/nowcast_analysis.py

      - name: Fetch MODIS LST (thermal anomaly discovery)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_modis_lst.py || echo "MODIS LST discovery completed (may need Earthdata auth for full download)"

      - name: Fetch Kakioka ULF magnetic data
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_kakioka_ulf.py || echo "ULF fetch completed (may need WDC registration for full access)"

      - name: Run ULF magnetic anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ulf_analysis.py || echo "ULF analysis skipped (insufficient data)"

      # --- Phase 9: Non-traditional precursor data sources ---

      - name: Fetch NMDB cosmic ray data (Homola et al. 2023)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_nmdb_cosmicray.py || echo "NMDB fetch failed (non-fatal)"

      - name: Run cosmic ray anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/cosmic_ray_analysis.py || echo "Cosmic ray analysis skipped (insufficient data)"

      - name: Fetch Blitzortung lightning data
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_blitzortung.py || echo "Lightning fetch failed (non-fatal)"

      - name: Fetch ISS LIS lightning data (Earthdata auth, 2017-2023)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install netCDF4 2>/dev/null || true
          python3 scripts/fetch_iss_lis_lightning.py || echo "ISS LIS fetch failed (non-fatal)"

      - name: Fetch INTERMAGNET hourly + CSES satellite EM data
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_cses_satellite.py || echo "Satellite EM fetch failed (non-fatal)"

      - name: Fetch Movebank animal tracking data
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          MOVEBANK_USER: ${{ secrets.MOVEBANK_USER }}
          MOVEBANK_PASS: ${{ secrets.MOVEBANK_PASS }}
        run: |
          python3 scripts/fetch_movebank.py || echo "Movebank fetch failed (non-fatal)"

      # --- Phase 10: Unconventional data sources ---

      - name: Fetch NOAA OLR daily (thermal anomaly, no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install netCDF4
          python3 scripts/fetch_olr.py || echo "OLR fetch failed (non-fatal)"

      - name: Fetch IERS Earth Orientation Parameters (no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_iers_eop.py || echo "IERS EOP fetch failed (non-fatal)"

      - name: Fetch NASA OMNIWeb solar wind hourly (no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_solar_wind.py || echo "Solar wind fetch failed (non-fatal)"

      - name: Fetch GRACE/GRACE-FO gravity anomaly (Earthdata auth optional)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_grace_gravity.py || echo "GRACE fetch failed (non-fatal)"

      - name: Fetch OMI SO2 column data (Earthdata auth optional)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_omi_so2.py || echo "SO2 fetch failed (non-fatal)"

      - name: Fetch SMAP soil moisture (Earthdata auth optional)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_smap_moisture.py || echo "SMAP fetch failed (non-fatal)"

      # --- Phase 10b: Additional unconventional sources ---

      - name: Fetch UHSLC tide gauge data (no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tide_gauge.py || echo "Tide gauge fetch failed (non-fatal)"

      - name: Fetch NASA ocean color chlorophyll-a (Earthdata auth optional)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_ocean_color.py || echo "Ocean color fetch failed (non-fatal)"

      - name: Fetch MODIS cloud fraction (Earthdata auth optional)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          python3 scripts/fetch_cloud_fraction.py || echo "Cloud fraction fetch failed (non-fatal)"

      - name: Fetch VIIRS nighttime light/airglow
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          EARTHDATA_TOKEN: ${{ secrets.EARTHDATA_TOKEN }}
          EARTHDATA_USERNAME: ${{ secrets.EARTHDATA_USERNAME }}
          EARTHDATA_PASSWORD: ${{ secrets.EARTHDATA_PASSWORD }}
        run: |
          pip install h5py 2>/dev/null || true
          python3 scripts/fetch_viirs_nighttime.py || echo "VIIRS fetch failed (non-fatal)"

      - name: Fetch InSAR deformation (COMET LiCSAR)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install rasterio 2>/dev/null || true
          python3 scripts/fetch_insar.py || echo "InSAR fetch failed (non-fatal)"

      # --- Phase 11: Space/cosmic data sources ---

      - name: Fetch GOES X-ray flux (solar flares, no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_xray.py || echo "GOES X-ray fetch failed (non-fatal)"

      - name: Fetch GOES proton flux (SEP events, no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_goes_proton.py || echo "GOES proton fetch failed (non-fatal)"

      - name: Compute tidal stress (lunar+solar, pure calculation)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_tidal_stress.py || echo "Tidal stress computation failed (non-fatal)"

      - name: Fetch GOES electron flux (particle precipitation, no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_poes_particles.py || echo "Particle flux fetch failed (non-fatal)"

      - name: Fetch NOAA DART ocean bottom pressure (no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_dart_pressure.py || echo "DART pressure fetch failed (non-fatal)"

      - name: Fetch IOC sea level monitoring (no auth)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/fetch_ioc_sealevel.py || echo "IOC sea level fetch failed (non-fatal)"

      - name: Fetch S-net seafloor pressure (NIED credentials required)
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
          HINET_USER: ${{ secrets.HINET_USER }}
          HINET_PASS: ${{ secrets.HINET_PASS }}
        run: |
          pip install HinetPy 2>/dev/null || true
          python3 scripts/fetch_snet_pressure.py || echo "S-net pressure fetch failed (non-fatal)"

      - name: Run MODIS LST thermal anomaly analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/modis_lst_analysis.py

      - name: Run GNSS-TEC high-resolution analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/gnss_tec_analysis.py || echo "GNSS-TEC analysis skipped (insufficient data)"

      - name: Run Pattern Informatics analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/pattern_informatics.py

      - name: Run ML integrated prediction
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/ml_prediction.py || echo "ML prediction failed (non-fatal)"

      - name: Run prospective prediction analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/prospective_analysis.py

      - name: Export feature matrix for neural network
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/export_feature_matrix.py || echo "Feature matrix export failed (non-fatal)"

      - name: Export CSEP forecast and run benchmark
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          pip install pycsep 2>/dev/null || true
          python3 scripts/export_csep.py || echo "CSEP export failed (non-fatal)"
          python3 scripts/csep_benchmark.py || echo "CSEP benchmark failed (non-fatal)"

      - name: Run ensemble stacking analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/stacking_analysis.py || echo "Stacking analysis failed (non-fatal)"

      - name: Run analysis
        env:
          GEOHAZARD_DB_PATH: ./data/geohazard.db
        run: |
          python3 scripts/run_analysis.py \
            --min-mag ${{ github.event.inputs.min_mag || '5.0' }} \
            --type ${{ github.event.inputs.analysis_type || 'all' }}

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: analysis-results-${{ github.run_id }}
          path: results/
          retention-days: 90
