<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Geohazard Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; }

        #header {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 100%);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a4a;
            flex-wrap: wrap;
            gap: 8px;
        }
        #header h1 { font-size: 18px; font-weight: 600; }
        #header h1 span { color: #ef5350; }
        #stats {
            display: flex;
            gap: 24px;
            font-size: 13px;
            flex-wrap: wrap;
        }
        .stat-value { font-size: 20px; font-weight: 700; color: #ef5350; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; }
        .stat-value.kp-low { color: #4caf50; }
        .stat-value.kp-mid { color: #ff9800; }
        .stat-value.kp-high { color: #f44336; }

        #map { height: calc(100vh - 52px); width: 100%; }

        .eq-popup, .amedas-popup {
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            line-height: 1.6;
        }
        .eq-popup .mag { font-size: 22px; font-weight: 700; margin-right: 8px; }
        .eq-popup .location { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .eq-popup .intensity-badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            background: #e65100;
            color: #fff;
        }
        .amedas-popup .station-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .amedas-popup .value-big { font-size: 20px; font-weight: 700; }

        .volcano-popup .volcano-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .volcano-popup .alert-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        .legend {
            background: rgba(10, 10, 26, 0.92);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.8;
            border: 1px solid #2a3a4a;
        }
        .legend-title { font-weight: 700; margin-bottom: 4px; font-size: 13px; color: #ef5350; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

        .layer-control {
            background: rgba(10, 10, 26, 0.92);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            border: 1px solid #2a3a4a;
        }
        .layer-control label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 3px 0;
        }
        .layer-control .section-title {
            font-weight: 700;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-top: 6px;
        }
        .layer-control .section-title:first-child { margin-top: 0; }

        .amedas-metric-select {
            background: rgba(10, 10, 26, 0.92);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #2a3a4a;
            font-size: 13px;
        }
        .amedas-metric-select select {
            background: #1b2838;
            color: #e0e0e0;
            border: 1px solid #3a4a5a;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>Japan <span>Geohazard Monitor</span></h1>
        <div id="stats">
            <div>
                <div class="stat-value" id="eq-count-24h">--</div>
                <div class="stat-label">Earthquakes (24h)</div>
            </div>
            <div>
                <div class="stat-value" id="eq-count-7d">--</div>
                <div class="stat-label">7 Days</div>
            </div>
            <div>
                <div class="stat-value" id="amedas-stations">--</div>
                <div class="stat-label">AMeDAS Stations</div>
            </div>
            <div>
                <div class="stat-value" id="kp-value">--</div>
                <div class="stat-label">Kp Index</div>
            </div>
            <div>
                <div class="stat-value" id="volcano-elevated">--</div>
                <div class="stat-label">Volcanoes (Alert)</div>
            </div>
            <div>
                <div class="stat-value" id="total-records">--</div>
                <div class="stat-label">Total Records</div>
            </div>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // === Color helpers ===
        function depthColor(depth) {
            if (depth == null) return '#888';
            if (depth < 10) return '#ff1744';
            if (depth < 30) return '#ff5722';
            if (depth < 70) return '#ff9800';
            if (depth < 150) return '#ffc107';
            if (depth < 300) return '#4fc3f7';
            return '#1565c0';
        }

        function magRadius(mag) {
            if (mag == null) return 4;
            if (mag < 2) return 3;
            if (mag < 3) return 4;
            if (mag < 4) return 6;
            if (mag < 5) return 9;
            if (mag < 6) return 13;
            if (mag < 7) return 18;
            return 24;
        }

        function tempColor(t) {
            if (t == null) return '#888';
            if (t < -10) return '#1565c0';
            if (t < 0) return '#42a5f5';
            if (t < 10) return '#4fc3f7';
            if (t < 20) return '#66bb6a';
            if (t < 30) return '#ff9800';
            return '#f44336';
        }

        function pressureColor(p) {
            if (p == null) return '#888';
            if (p < 1000) return '#7b1fa2';
            if (p < 1005) return '#e040fb';
            if (p < 1010) return '#42a5f5';
            if (p < 1015) return '#66bb6a';
            if (p < 1020) return '#ffeb3b';
            if (p < 1025) return '#ff9800';
            return '#f44336';
        }

        function precipColor(p) {
            if (p == null || p === 0) return 'rgba(100,100,100,0.2)';
            if (p < 1) return '#4fc3f7';
            if (p < 5) return '#2196f3';
            if (p < 10) return '#1565c0';
            if (p < 20) return '#ff9800';
            return '#f44336';
        }

        function windColor(w) {
            if (w == null) return '#888';
            if (w < 3) return '#66bb6a';
            if (w < 7) return '#ffeb3b';
            if (w < 12) return '#ff9800';
            return '#f44336';
        }

        function getAmedasColor(metric, value) {
            switch (metric) {
                case 'temperature': return tempColor(value);
                case 'pressure': return pressureColor(value);
                case 'precipitation': return precipColor(value);
                case 'wind': return windColor(value);
                default: return '#888';
            }
        }

        function formatTime(iso) {
            if (!iso) return '--';
            const d = new Date(iso);
            return d.toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
        }

        const metricUnits = {
            pressure: 'hPa', temperature: '°C', humidity: '%',
            wind: 'm/s', precipitation: 'mm/h',
        };

        // === Map setup ===
        const map = L.map('map', { center: [36.0, 138.0], zoom: 5, zoomControl: true });

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 18,
        }).addTo(map);

        // === Layers ===
        let eqLayer = L.layerGroup().addTo(map);
        let volcanoLayer = L.layerGroup();
        let sstLayer = L.layerGroup();
        let tecLayer = L.layerGroup();
        let amedasLayer = L.layerGroup();
        let currentAmedasMetric = 'temperature';

        function volcanoColor(level) {
            if (level >= 5) return '#9c27b0';
            if (level >= 4) return '#f44336';
            if (level >= 3) return '#ff9800';
            if (level >= 2) return '#ffeb3b';
            return '#aaaaaa';
        }

        function tecColor(tec) {
            // TEC in TECU: low=transparent, moderate=green, high=purple
            if (tec == null) return 'rgba(0,0,0,0)';
            if (tec < 10) return 'rgba(76,175,80,0.3)';
            if (tec < 20) return 'rgba(76,175,80,0.5)';
            if (tec < 30) return 'rgba(255,235,59,0.5)';
            if (tec < 50) return 'rgba(255,152,0,0.6)';
            if (tec < 80) return 'rgba(244,67,54,0.6)';
            return 'rgba(156,39,176,0.7)';
        }

        function sstColor(t) {
            if (t == null) return 'rgba(0,0,0,0)';
            if (t < 5) return '#1565c0';
            if (t < 10) return '#42a5f5';
            if (t < 15) return '#4fc3f7';
            if (t < 20) return '#66bb6a';
            if (t < 25) return '#ffeb3b';
            if (t < 28) return '#ff9800';
            return '#f44336';
        }

        // === Layer control (top-right) ===
        const layerControl = L.control({ position: 'topright' });
        layerControl.onAdd = function() {
            const div = L.DomUtil.create('div', 'layer-control');
            div.innerHTML = `
                <div class="section-title">Layers</div>
                <label><input type="checkbox" id="chk-eq" checked> Earthquakes</label>
                <label><input type="checkbox" id="chk-volcano"> Volcanoes</label>
                <label><input type="checkbox" id="chk-sst"> Sea Surface Temp</label>
                <label><input type="checkbox" id="chk-tec"> Ionosphere TEC</label>
                <label><input type="checkbox" id="chk-amedas"> AMeDAS</label>
                <div class="section-title" style="margin-top:8px">AMeDAS Metric</div>
                <select id="amedas-metric">
                    <option value="temperature">Temperature</option>
                    <option value="pressure">Pressure</option>
                    <option value="wind">Wind Speed</option>
                    <option value="precipitation">Precipitation</option>
                </select>
            `;
            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        layerControl.addTo(map);

        // Layer toggle handlers
        document.addEventListener('change', function(e) {
            if (e.target.id === 'chk-eq') {
                e.target.checked ? map.addLayer(eqLayer) : map.removeLayer(eqLayer);
            } else if (e.target.id === 'chk-volcano') {
                if (e.target.checked) { map.addLayer(volcanoLayer); loadVolcanoes(); }
                else map.removeLayer(volcanoLayer);
            } else if (e.target.id === 'chk-sst') {
                if (e.target.checked) { map.addLayer(sstLayer); loadSST(); }
                else map.removeLayer(sstLayer);
            } else if (e.target.id === 'chk-tec') {
                if (e.target.checked) { map.addLayer(tecLayer); loadTEC(); }
                else map.removeLayer(tecLayer);
            } else if (e.target.id === 'chk-amedas') {
                if (e.target.checked) { map.addLayer(amedasLayer); loadAmedas(); }
                else map.removeLayer(amedasLayer);
            } else if (e.target.id === 'amedas-metric') {
                currentAmedasMetric = e.target.value;
                loadAmedas();
            }
        });

        // === Depth legend (bottom-right) ===
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function() {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<div class="legend-title">Depth (km)</div>';
            const levels = [
                ['< 10', '#ff1744'], ['10-30', '#ff5722'], ['30-70', '#ff9800'],
                ['70-150', '#ffc107'], ['150-300', '#4fc3f7'], ['> 300', '#1565c0'],
            ];
            levels.forEach(([label, color]) => {
                div.innerHTML += `<div class="legend-item"><span class="legend-dot" style="background:${color}"></span>${label}</div>`;
            });
            return div;
        };
        legend.addTo(map);

        // === Data loaders ===
        async function loadEarthquakes() {
            try {
                const res = await fetch('/api/earthquakes?hours=168');
                const data = await res.json();

                eqLayer.clearLayers();
                data.earthquakes.forEach(eq => {
                    const marker = L.circleMarker([eq.lat, eq.lon], {
                        radius: magRadius(eq.mag),
                        fillColor: depthColor(eq.depth),
                        color: '#fff',
                        weight: 0.8,
                        fillOpacity: 0.75,
                    });

                    const location = eq.location_ja || eq.location_en || '--';
                    const intensityHtml = eq.intensity
                        ? `<span class="intensity-badge">震度 ${eq.intensity}</span>` : '';

                    marker.bindPopup(`
                        <div class="eq-popup">
                            <div><span class="mag">M${eq.mag != null ? eq.mag.toFixed(1) : '?'}</span>${intensityHtml}</div>
                            <div class="location">${location}</div>
                            <strong>深さ:</strong> ${eq.depth != null ? eq.depth.toFixed(1) + ' km' : '--'}<br>
                            <strong>時刻:</strong> ${formatTime(eq.time)}<br>
                            <strong>ソース:</strong> ${eq.source.toUpperCase()}
                        </div>
                    `);
                    eqLayer.addLayer(marker);
                });
            } catch (e) {
                console.error('Failed to load earthquakes:', e);
            }
        }

        async function loadAmedas() {
            try {
                const res = await fetch(`/api/amedas?metric=${currentAmedasMetric}`);
                const data = await res.json();
                const unit = metricUnits[currentAmedasMetric] || '';

                amedasLayer.clearLayers();
                data.stations.forEach(s => {
                    const color = getAmedasColor(currentAmedasMetric, s.value);
                    const marker = L.circleMarker([s.lat, s.lon], {
                        radius: 4,
                        fillColor: color,
                        color: color,
                        weight: 1,
                        fillOpacity: 0.85,
                    });

                    const displayVal = s.value != null ? s.value.toFixed(1) : '--';
                    marker.bindPopup(`
                        <div class="amedas-popup">
                            <div class="station-name">${s.name || s.id}</div>
                            <div class="value-big">${displayVal} ${unit}</div>
                        </div>
                    `);
                    amedasLayer.addLayer(marker);
                });
            } catch (e) {
                console.error('Failed to load AMeDAS:', e);
            }
        }

        async function loadVolcanoes() {
            try {
                const res = await fetch('/api/volcanoes');
                const data = await res.json();

                volcanoLayer.clearLayers();
                data.volcanoes.forEach(v => {
                    const color = volcanoColor(v.alert_level);
                    // Triangle marker using DivIcon
                    const icon = L.divIcon({
                        className: '',
                        html: `<svg width="18" height="18" viewBox="0 0 18 18">
                            <polygon points="9,1 17,17 1,17" fill="${color}" stroke="#fff" stroke-width="1.2"/>
                        </svg>`,
                        iconSize: [18, 18],
                        iconAnchor: [9, 17],
                    });
                    const marker = L.marker([v.lat, v.lon], { icon });

                    const alertBg = volcanoColor(v.alert_level);
                    marker.bindPopup(`
                        <div class="volcano-popup">
                            <div class="volcano-name">${v.name_ja} (${v.name_en})</div>
                            <span class="alert-badge" style="background:${alertBg}">
                                Level ${v.alert_level}
                            </span>
                            <span style="font-size:12px;margin-left:4px">${v.alert_name_ja || ''}</span>
                            ${v.report_datetime ? '<br><strong>報告:</strong> ' + formatTime(v.report_datetime) : ''}
                        </div>
                    `);
                    volcanoLayer.addLayer(marker);
                });
            } catch (e) {
                console.error('Failed to load volcanoes:', e);
            }
        }

        async function loadSST() {
            try {
                const res = await fetch('/api/sst');
                const data = await res.json();

                sstLayer.clearLayers();
                data.grid.forEach(p => {
                    const color = sstColor(p.sst);
                    const rect = L.rectangle(
                        [[p.lat - 0.25, p.lon - 0.25], [p.lat + 0.25, p.lon + 0.25]],
                        { color: color, fillColor: color, fillOpacity: 0.5, weight: 0, interactive: false }
                    );
                    sstLayer.addLayer(rect);
                });
            } catch (e) {
                console.error('Failed to load SST:', e);
            }
        }

        async function loadTEC() {
            try {
                const res = await fetch('/api/tec?hours=48');
                const data = await res.json();

                tecLayer.clearLayers();
                data.grid.forEach(p => {
                    const color = tecColor(p.tec);
                    const rect = L.rectangle(
                        [[p.lat - 1.25, p.lon - 2.5], [p.lat + 1.25, p.lon + 2.5]],
                        { color: color, fillColor: color, fillOpacity: 0.6, weight: 0.5,
                          interactive: true }
                    );
                    rect.bindPopup(`
                        <div style="font-size:13px">
                            <strong>TEC:</strong> ${p.tec.toFixed(1)} TECU<br>
                            <strong>Lat:</strong> ${p.lat}° <strong>Lon:</strong> ${p.lon}°<br>
                            <strong>Product:</strong> ${p.product}
                        </div>
                    `);
                    tecLayer.addLayer(rect);
                });
            } catch (e) {
                console.error('Failed to load TEC:', e);
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('eq-count-24h').textContent = stats.earthquakes_24h;
                document.getElementById('eq-count-7d').textContent = stats.earthquakes_7d;
                document.getElementById('total-records').textContent =
                    stats.total_records > 1000 ? (stats.total_records / 1000).toFixed(1) + 'K' : stats.total_records;

                // AMeDAS station count
                document.getElementById('amedas-stations').textContent = stats.amedas_stations || '--';

                // Volcano elevated count
                const volcEl = document.getElementById('volcano-elevated');
                volcEl.textContent = stats.volcano_elevated != null
                    ? `${stats.volcano_elevated}/${stats.volcano_total || '?'}` : '--';

                // Kp index with color coding
                const kpEl = document.getElementById('kp-value');
                if (stats.kp_latest != null) {
                    kpEl.textContent = stats.kp_latest.toFixed(1);
                    kpEl.className = 'stat-value ' +
                        (stats.kp_latest < 4 ? 'kp-low' : stats.kp_latest < 6 ? 'kp-mid' : 'kp-high');
                } else {
                    kpEl.textContent = '--';
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        // === Initial load + polling ===
        loadEarthquakes();
        loadStats();
        setInterval(() => { loadEarthquakes(); loadStats(); }, 60000);
        // AMeDAS refresh every 10 min (matches collector interval)
        setInterval(() => {
            if (document.getElementById('chk-amedas')?.checked) loadAmedas();
        }, 600000);
    </script>
</body>
</html>
